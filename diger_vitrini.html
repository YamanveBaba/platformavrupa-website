<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diğer İlanlar | PlatformAvrupa</title>
    <meta name="description" content="Avrupa'da diğer ilanlar. Çeşitli kategorilerde ilanlar. Gurbetçiler için ilan vitrini.">
    <link rel="canonical" href="https://www.platformavrupa.com/diger_vitrini.html">
    <meta property="og:title" content="Diğer İlanlar | PlatformAvrupa">
    <meta property="og:description" content="Avrupa'da diğer ilanlar.">
    <meta property="og:url" content="https://www.platformavrupa.com/diger_vitrini.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Platform Avrupa">
    <meta property="og:image" content="https://www.platformavrupa.com/og-image.png">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Diğer İlanlar | PlatformAvrupa">
    <meta name="twitter:description" content="Avrupa'da diğer ilanlar.">
    <meta name="twitter:image" content="https://www.platformavrupa.com/og-image.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #1e293b; }

        @media (min-width: 1024px) {
            body { height: 100vh; overflow: hidden; }
            #main-container { height: calc(100vh - 64px); }
        }
        
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }

        .modern-select { width: 100%; background-color: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 500; color: #334155; outline: none; transition: all 0.2s; cursor: pointer; }
        .modern-select:focus { border-color: #475569; box-shadow: 0 0 0 3px rgba(71, 85, 105, 0.1); }
        .modern-select:disabled { opacity: 0.6; cursor: not-allowed; background-color: #f8fafc; }
        
        /* Select Ok İşareti */
        select.modern-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23475569' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.2em 1.2em;
            padding-right: 2.5rem;
        }

        #map { height: 100%; width: 100%; border-radius: 16px; z-index: 0; min-height: 400px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* GÖRÜNÜM BUTONU */
        .view-toggle { display: flex; background: white; border: 1px solid #E5E7EB; border-radius: 99px; padding: 3px; }
        .view-btn { padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: all 0.2s; color: #6B7280; }
        .view-btn.active { background: #f1f5f9; color: #334155; }

        /* BUTONLAR */
        .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .type-btn { 
            background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; 
            padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 600; 
            cursor: pointer; transition: all 0.2s ease; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
        }
        .type-btn:hover { border-color: #94a3b8; color: #475569; background: #e2e8f0; }
        .type-btn.active { background: #475569; color: white; border-color: #475569; box-shadow: 0 4px 10px rgba(71, 85, 105, 0.3); }
        .filter-title { text-align: center; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #475569; margin-bottom: 1rem; position: relative; padding-bottom: 8px; }
        .filter-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background-color: #cbd5e1; border-radius: 2px; }
    </style>
</head>
<body class="flex flex-col min-h-screen lg:h-screen">

    <nav class="glass sticky top-0 z-50 px-6 h-20 flex justify-between items-center shadow-sm flex-shrink-0">
        <a href="index.html" class="flex items-center gap-2 text-slate-600 hover:text-slate-900 transition font-bold">
            <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-200 transition"><i class="fa-solid fa-arrow-left"></i></div>
            <span class="hidden sm:inline">Ana Sayfa</span>
        </a>
        
        <div class="absolute left-1/2 transform -translate-x-1/2 hidden md:block">
            <h1 class="font-extrabold text-lg tracking-tight text-slate-700 uppercase">DİĞER İLANLAR</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="view-toggle hidden md:flex">
                <button onclick="setView('liste')" id="btnListe" class="view-btn active"><i class="fa-solid fa-list"></i> Liste</button>
                <button onclick="setView('harita')" id="btnHarita" class="view-btn"><i class="fa-solid fa-map"></i> Harita</button>
            </div>
            <a href="ilan_giris.html" class="bg-slate-700 hover:bg-slate-800 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-lg transition transform active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">İlan Ver</span>
            </a>
        </div>
    </nav>

    <div id="main-container" class="block lg:flex lg:gap-6 lg:p-6 bg-white flex-1 lg:overflow-hidden">
        
        <div class="w-full lg:w-[360px] bg-slate-50/50 lg:rounded-2xl lg:border border-slate-200 lg:shadow-sm flex flex-col mb-4 lg:mb-0 lg:h-full flex-shrink-0">
            <div class="p-5 space-y-5 lg:overflow-y-auto lg:flex-1 no-scrollbar">
                
                <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 mb-2 flex items-start gap-2">
                    <i class="fa-solid fa-circle-info text-blue-500 mt-0.5 text-xs"></i>
                    <p class="text-xs text-blue-800 leading-snug">
                        Burası diğer kategorilere uymayan (Yol Arkadaşı, Kayıp/Buluntu, Duyuru vb.) genel ilanlar bölümüdür.
                    </p>
                </div>

                <div>
                    <h3 class="filter-title">Kategori Seçimi</h3>
                    <div class="type-grid">
                        <button onclick="setFilter('kategori', 'Hepsi', this)" class="type-btn active col-span-2"><i class="fa-solid fa-border-all"></i> Hepsi</button>
                        <button onclick="setFilter('kategori', 'Yol Arkadaşı', this)" class="type-btn"><i class="fa-solid fa-car-side"></i> Yol Arkadaşı</button>
                        <button onclick="setFilter('kategori', 'Kayıp Eşya', this)" class="type-btn"><i class="fa-solid fa-magnifying-glass"></i> Kayıp</button>
                        <button onclick="setFilter('kategori', 'Duyuru', this)" class="type-btn"><i class="fa-solid fa-bullhorn"></i> Duyuru</button>
                        <button onclick="setFilter('kategori', 'Emanet', this)" class="type-btn"><i class="fa-solid fa-box-open"></i> Emanet</button>
                        <button onclick="setFilter('kategori', 'Etkinlik', this)" class="type-btn"><i class="fa-solid fa-calendar-day"></i> Etkinlik</button>
                        <button onclick="setFilter('kategori', 'Diğer', this)" class="type-btn"><i class="fa-solid fa-ellipsis"></i> Diğer</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <select id="ulkeSelect" onchange="ulkeSecildi()" class="modern-select">
                        <option value="">Tüm Ülkeler</option>
                    </select>
                    <select id="sehirSelect" onchange="sehirSecildi()" class="modern-select" disabled>
                        <option value="">Şehir Seç</option>
                    </select>
                </div>

            </div>
            
            <div class="p-4 border-t border-slate-200 text-center text-xs text-slate-500 font-bold bg-slate-100 lg:rounded-b-2xl">
                <span id="ilanSayisi">0</span> ilan bulundu
            </div>
        </div>

        <div class="flex-1 relative px-4 lg:px-0 pb-10 lg:pb-0 lg:h-full lg:overflow-hidden">
            <div id="listView" class="h-full lg:overflow-y-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 content-start no-scrollbar"></div>
            <div id="mapView" class="hidden h-[500px] lg:h-full w-full rounded-2xl overflow-hidden shadow-sm border border-gray-200 relative bg-white"><div id="map"></div></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="genel_veriler.js"></script>

    <script>
        const SUPABASE_URL = 'https://vhietrqljahdmloazgpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoaWV0cnFsamFoZG1sb2F6Z3BwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNTk5MTcsImV4cCI6MjA4MDYzNTkxN30.sxpUrTnR40XuEBPUeQXj352xMziGr_lDqdA8H69ejBA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map = null;
        let markers = [];
        let tumIlanlar = [];
        let filters = { kategori: 'Hepsi', country: '', city: '' };

        window.onload = function() {
            initMap();
            
            // 1. genel_veriler.js'den ülkeleri dolduruyoruz (ELLE YAZILAN LİSTEYİ SİLDİK)
            if (typeof ulkeleriDoldur === 'function') {
                ulkeleriDoldur('ulkeSelect');
            }
            
            veriCekVeBirlestir();
        };

        function initMap() {
            if(document.getElementById('map') && !map) {
                map = L.map('map').setView([48.0, 10.0], 4);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { 
                    attribution: '© OpenStreetMap contributors' 
                }).addTo(map);
            }
        }

        // --- AKILLI ZOOM (API ile) ---
        // Bu fonksiyon senin genel_veriler.js'deki isimleri alır ve haritada bulur
        function akilliZoom(yerAdi, zoomSeviyesi) {
            if(!map || !yerAdi) return;
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${yerAdi}&addressdetails=1&limit=1`)
                .then(r => r.json())
                .then(d => {
                    if(d && d.length > 0) {
                        const lat = parseFloat(d[0].lat);
                        const lon = parseFloat(d[0].lon);
                        map.flyTo([lat, lon], zoomSeviyesi, { duration: 1.5 });
                    }
                })
                .catch(e => console.log("Harita hatası:", e));
        }

        function ulkeSecildi() {
            const code = document.getElementById('ulkeSelect').value;
            filters.country = code; 
            
            // genel_veriler.js'den şehirleri doldur
            if (typeof sehirleriGetirOrtak === 'function') sehirleriGetirOrtak(code, 'sehirSelect');
            
            const sehirSelect = document.getElementById('sehirSelect');
            
            if(code) {
                // genel_veriler.js içindeki lokasyonVeritabani objesini kullanıyoruz
                if (typeof lokasyonVeritabani !== 'undefined' && lokasyonVeritabani[code]) {
                    const ulkeIsmi = lokasyonVeritabani[code].isim;
                    // API ile haritayı oraya uçuruyoruz
                    akilliZoom(ulkeIsmi, 6); 
                }
                
                sehirSelect.disabled = false;
                sehirSelect.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                sehirSelect.disabled = true;
                sehirSelect.classList.add('opacity-50', 'cursor-not-allowed');
                map.setView([48.0, 10.0], 4); 
            }
            filters.city = ""; 
            filtrele();
        }

        function sehirSecildi() {
            const sehir = document.getElementById('sehirSelect').value;
            filters.city = sehir;
            
            if(sehir) {
                // Şehir seçildiyse API ile oraya zoomla
                // Ülke kodunu da ekleyelim ki yanlış şehir bulmasın (örn: Berlin, USA yerine Berlin, Germany)
                const ulkeKodu = document.getElementById('ulkeSelect').value;
                let tamAdres = sehir;
                
                if (typeof lokasyonVeritabani !== 'undefined' && lokasyonVeritabani[ulkeKodu]) {
                    tamAdres += ", " + lokasyonVeritabani[ulkeKodu].isim;
                }
                
                akilliZoom(tamAdres, 12);
            }
            
            filtrele();
        }

        async function veriCekVeBirlestir() {
            const listDiv = document.getElementById('listView');
            listDiv.innerHTML = '<div class="col-span-full text-center py-20 opacity-50"><i class="fa-solid fa-circle-notch fa-spin text-slate-500 text-3xl"></i></div>';
            
            tumIlanlar = [];

            if (sb) {
                try {
                    const { data, error } = await sb
                        .from('ilanlar')
                        .select('*')
                        .eq('category', 'Diğer')
                        .order('created_at', { ascending: false });

                    if (!error && data) {
                        tumIlanlar = data.map(i => ({
                            id: i.id,
                            kategori: i.sub_category || 'Diğer',
                            baslik: i.title,
                            konum: i.city,
                            fiyat: i.price,
                            resim: i.image,
                            lat: 48.0 + (Math.random() * 5), 
                            lon: 10.0 + (Math.random() * 5)
                        }));
                    }
                } catch (err) { console.error(err); }
            }

            filtrele();
        }

        function setFilter(type, value, btn) {
            if (btn) {
                const group = btn.closest('.type-grid');
                group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            if(type === 'kategori') filters.kategori = value;
            filtrele();
        }

        function filtrele() {
            const suzulen = tumIlanlar.filter(ilan => {
                const kategoriUyumu = (filters.kategori === "Hepsi") || (ilan.kategori === filters.kategori);
                const sehirUyumu = (filters.city === "") || (ilan.konum === filters.city);
                return sehirUyumu; 
            });

            document.getElementById('ilanSayisi').innerText = suzulen.length;
            renderList(suzulen);
            renderMap(suzulen);
        }

        function renderList(data) {
            const container = document.getElementById('listView');
            container.innerHTML = "";

            if(data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 opacity-60"><h3 class="font-bold text-slate-700">İlan Bulunamadı</h3><p class="text-sm text-slate-500">Bu kriterlerde ilan yok.</p></div>`;
                return;
            }

            data.forEach(item => {
                let imgHTML = "";
                if(item.resim && item.resim.startsWith('http')) {
                    imgHTML = `<img src="${item.resim}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">`;
                } else {
                    imgHTML = `<div class="w-full h-full bg-slate-100 flex items-center justify-center text-slate-400"><i class="fa-solid fa-image text-4xl opacity-50"></i></div>`;
                }

                container.innerHTML += `
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 hover:shadow-lg transition cursor-pointer group">
                    <div class="relative h-48 bg-slate-100">
                        ${imgHTML}
                        <span class="absolute top-3 right-3 bg-slate-800/80 backdrop-blur text-white px-2 py-1 rounded-md text-xs font-bold">${item.kategori}</span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-slate-800 text-sm mb-1 truncate">${item.baslik}</h3>
                        <div class="flex justify-between items-center mt-3">
                            <p class="text-xs text-slate-400 flex items-center gap-1"><i class="fa-solid fa-location-dot"></i> ${item.konum}</p>
                            <span class="font-bold text-slate-700 text-sm">${item.fiyat}</span>
                        </div>
                    </div>
                </div>`;
            });
        }

        function renderMap(data) {
            if(!map) return;
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            data.forEach(item => {
                if(item.lat && item.lon) {
                    const marker = L.marker([item.lat, item.lon]).addTo(map);
                    marker.bindPopup(`<b>${item.baslik}</b><br>${item.konum}`);
                    markers.push(marker);
                }
            });
            
            if(!document.getElementById('mapView').classList.contains('hidden') && markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        function setView(view) {
            const listDiv = document.getElementById('listView');
            const mapDiv = document.getElementById('mapView');
            const btnList = document.getElementById('btnListe');
            const btnMap = document.getElementById('btnHarita');

            if(view === 'harita') {
                listDiv.classList.add('hidden');
                mapDiv.classList.remove('hidden');
                btnMap.classList.add('active');
                btnList.classList.remove('active');
                setTimeout(() => { map.invalidateSize(); }, 200);
            } else {
                listDiv.classList.remove('hidden');
                mapDiv.classList.add('hidden');
                btnList.classList.add('active');
                btnMap.classList.remove('active');
            }
        }
    </script>
</body>
</html>
