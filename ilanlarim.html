    <meta charset="UTF-8">

    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-earth-europe text-sm"></i>
                </div>
                <span class="font-bold text-lg text-slate-900">Platform<span class="text-blue-600">Avrupa</span></span>
            </a>
            <div class="flex items-center gap-4">
                <a href="profil.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition">
                    <i class="fa-regular fa-user mr-1"></i> Profilim
                </a>
                <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition">
                    <i class="fa-solid fa-house mr-1"></i> Ana Sayfa
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-12">
        
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold text-slate-900">İlanlarım</h1>
            <a href="ilan_giris.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition shadow-lg shadow-blue-200 flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Yeni İlan Ver
            </a>
        </div>

        <!-- Tab Menüsü -->
        <div class="flex gap-2 mb-6 overflow-x-auto">
            <button onclick="tabDegistir('ilanlar')" id="tab-ilanlar" class="tab-btn active px-4 py-2 rounded-full text-sm font-bold border border-slate-200 bg-slate-900 text-white">
                <i class="fa-solid fa-list mr-1"></i> İlanlarım
            </button>
            <button onclick="tabDegistir('yolculuklar')" id="tab-yolculuklar" class="tab-btn px-4 py-2 rounded-full text-sm font-bold border border-slate-200 bg-white text-slate-600 hover:bg-slate-50">
                <i class="fa-solid fa-car mr-1"></i> Yolculuklarım
            </button>
            <button onclick="tabDegistir('kargolar')" id="tab-kargolar" class="tab-btn px-4 py-2 rounded-full text-sm font-bold border border-slate-200 bg-white text-slate-600 hover:bg-slate-50">
                <i class="fa-solid fa-box mr-1"></i> Kargo Taleplerim
            </button>
        </div>

        <!-- İlanlar Listesi -->
        <div id="content-ilanlar" class="content-area">
            <div id="ilanlarContainer" class="space-y-4">
                <div class="text-center py-10 text-slate-400">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>Yükleniyor...</p>
                </div>
            </div>
        </div>

        <!-- Yolculuklar Listesi -->
        <div id="content-yolculuklar" class="content-area hidden">
            <div id="yolculuklarContainer" class="space-y-4">
                <div class="text-center py-10 text-slate-400">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>Yükleniyor...</p>
                </div>
            </div>
        </div>

        <!-- Kargolar Listesi -->
        <div id="content-kargolar" class="content-area hidden">
            <div id="kargolarContainer" class="space-y-4">
                <div class="text-center py-10 text-slate-400">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>Yükleniyor...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        let userId = null;

        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', async function() {
            // Kullanıcı kontrolü
            const user = await getCurrentUser();
            if (!user) {
                localStorage.setItem('authRedirect', window.location.href);
                window.location.href = 'login.html';
                return;
            }
            userId = user.id;
            
            // Verileri yükle
            await Promise.all([
                ilanlarimGetir(),
                yolculuklarimGetir(),
                kargolarimGetir()
            ]);
        });

        // Tab değiştirme
        function tabDegistir(tabId) {
            // Tüm tab butonlarını pasif yap
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-slate-900', 'text-white');
                btn.classList.add('bg-white', 'text-slate-600');
            });
            
            // Aktif tab'ı işaretle
            const activeTab = document.getElementById('tab-' + tabId);
            activeTab.classList.remove('bg-white', 'text-slate-600');
            activeTab.classList.add('bg-slate-900', 'text-white');
            
            // Tüm içerikleri gizle
            document.querySelectorAll('.content-area').forEach(area => {
                area.classList.add('hidden');
            });
            
            // Seçili içeriği göster
            document.getElementById('content-' + tabId).classList.remove('hidden');
        }

        // İlanlarımı getir
        async function ilanlarimGetir() {
            const container = document.getElementById('ilanlarContainer');
            
            try {
                const { data, error } = await sb
                    .from('ilanlar')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    container.innerHTML = bosKutu('İlan', 'Henüz hiç ilan vermediniz.', 'ilan_giris.html');
                    return;
                }
                
                container.innerHTML = '';
                data.forEach(ilan => {
                    container.innerHTML += ilanKarti(ilan);
                });
                
            } catch (err) {
                console.error('İlanlar yüklenemedi:', err);
                container.innerHTML = '<p class="text-center text-red-500 py-10">Veriler yüklenemedi.</p>';
            }
        }

        // Yolculuklarımı getir
        async function yolculuklarimGetir() {
            const container = document.getElementById('yolculuklarContainer');
            
            try {
                const { data, error } = await sb
                    .from('trips')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    container.innerHTML = bosKutu('Yolculuk', 'Henüz yolculuk ilanı vermediniz.', 'ilan_giris.html');
                    return;
                }
                
                container.innerHTML = '';
                data.forEach(trip => {
                    container.innerHTML += yolculukKarti(trip);
                });
                
            } catch (err) {
                console.error('Yolculuklar yüklenemedi:', err);
                container.innerHTML = '<p class="text-center text-red-500 py-10">Veriler yüklenemedi.</p>';
            }
        }

        // Kargolarımı getir
        async function kargolarimGetir() {
            const container = document.getElementById('kargolarContainer');
            
            try {
                const { data, error } = await sb
                    .from('shipments')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    container.innerHTML = bosKutu('Kargo', 'Henüz kargo talebi oluşturmadınız.', 'ilan_giris.html');
                    return;
                }
                
                container.innerHTML = '';
                data.forEach(kargo => {
                    container.innerHTML += kargoKarti(kargo);
                });
                
            } catch (err) {
                console.error('Kargolar yüklenemedi:', err);
                container.innerHTML = '<p class="text-center text-red-500 py-10">Veriler yüklenemedi.</p>';
            }
        }

        // Boş kutu şablonu
        function bosKutu(tip, mesaj, link) {
            return `
            <div class="bg-white rounded-3xl p-16 text-center border-2 border-dashed border-slate-200">
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-4xl text-slate-300 mx-auto mb-6">
                    <i class="fa-solid fa-box-open"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-2">${sanitize(tip)} Bulunamadı</h3>
                <p class="text-slate-500 max-w-sm mx-auto mb-8">${sanitize(mesaj)}</p>
                <a href="${link}" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition">
                    İlk ${sanitize(tip)}ını Ver
                </a>
            </div>`;
        }

        // İlan kartı şablonu
        function ilanKarti(ilan) {
            const safeTitle = sanitize(ilan.baslik || ilan.title || 'İlan');
            const safeCategory = sanitize(ilan.kategori || ilan.category || '');
            const safePrice = sanitize(ilan.fiyat || ilan.price || '');
            const safeCity = sanitize(ilan.konum || ilan.city || '');
            const status = ilan.status === 'active' ? 
                '<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Aktif</span>' : 
                '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs font-bold">Beklemede</span>';
            const image = ilan.resim || ilan.image || 'https://via.placeholder.com/100x100?text=Resim+Yok';
            
            return `
            <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm hover:shadow-md transition flex gap-4">
                <div class="w-24 h-24 rounded-xl overflow-hidden bg-slate-100 shrink-0">
                    <img src="${sanitizeURL(image)}" alt="${safeTitle}" class="w-full h-full object-cover" loading="lazy">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2 mb-2">
                        <h3 class="font-bold text-slate-900 truncate">${safeTitle}</h3>
                        ${status}
                    </div>
                    <p class="text-sm text-slate-500 mb-1">${safeCategory} • ${safeCity}</p>
                    <p class="font-bold text-blue-600">${safePrice}</p>
                </div>
                <div class="flex flex-col gap-2 shrink-0">
                    <button onclick="ilanSil('${sanitize(ilan.id)}', 'ilanlar')" class="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 flex items-center justify-center transition" title="Sil">
                        <i class="fa-solid fa-trash text-sm"></i>
                    </button>
                </div>
            </div>`;
        }

        // Yolculuk kartı şablonu
        function yolculukKarti(trip) {
            const safeFrom = sanitize(trip.from_city);
            const safeTo = sanitize(trip.to_city);
            const safeDate = formatDate(trip.travel_date, 'long');
            const safePrice = sanitize(trip.price);
            
            return `
            <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm hover:shadow-md transition">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                            <i class="fa-solid fa-car"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-900">${safeFrom} → ${safeTo}</h3>
                            <p class="text-xs text-slate-400">${safeDate}</p>
                        </div>
                    </div>
                    <span class="font-bold text-lg text-emerald-600">${safePrice}€</span>
                </div>
                <div class="flex items-center justify-between pt-3 border-t border-slate-100">
                    <div class="flex items-center gap-4 text-sm text-slate-500">
                        <span><i class="fa-solid fa-chair mr-1"></i> ${sanitize(trip.seats_available)} koltuk</span>
                        ${trip.is_cargo_allowed ? '<span class="text-green-600"><i class="fa-solid fa-box mr-1"></i> Kargo alır</span>' : ''}
                    </div>
                    <button onclick="ilanSil('${sanitize(trip.id)}', 'trips')" class="text-red-500 hover:text-red-700 text-sm">
                        <i class="fa-solid fa-trash mr-1"></i> Sil
                    </button>
                </div>
            </div>`;
        }

        // Kargo kartı şablonu
        function kargoKarti(kargo) {
            const safeFrom = sanitize(kargo.from_city);
            const safeTo = sanitize(kargo.to_city);
            const safeDesc = sanitize(kargo.description);
            const statusClass = kargo.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700';
            const statusText = kargo.status === 'pending' ? 'Bekliyor' : 'Eşleşti';
            
            return `
            <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm hover:shadow-md transition">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-600">
                            <i class="fa-solid fa-box"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-900">${safeFrom} → ${safeTo}</h3>
                            <p class="text-sm text-slate-500 mt-1">${safeDesc}</p>
                        </div>
                    </div>
                    <span class="px-2 py-1 rounded text-xs font-bold ${statusClass}">${statusText}</span>
                </div>
                <div class="flex justify-end pt-3 border-t border-slate-100">
                    <button onclick="ilanSil('${sanitize(kargo.id)}', 'shipments')" class="text-red-500 hover:text-red-700 text-sm">
                        <i class="fa-solid fa-trash mr-1"></i> Sil
                    </button>
                </div>
            </div>`;
        }

        // İlan silme
        async function ilanSil(id, tablo) {
            if (!confirm('Bu kaydı silmek istediğinizden emin misiniz?')) return;
            
            try {
                const { error } = await sb.from(tablo).delete().eq('id', id).eq('user_id', userId);
                
                if (error) throw error;
                
                // Listeyi yenile
                if (tablo === 'ilanlar') await ilanlarimGetir();
                else if (tablo === 'trips') await yolculuklarimGetir();
                else if (tablo === 'shipments') await kargolarimGetir();
                
            } catch (err) {
                console.error('Silme hatası:', err);
                alert('Silme işlemi başarısız oldu.');
            }
        }
    </script>
</body>
</html>
