        // --- SAYFA YÜKLENDİĞİNDE ---
        // Script yükleme kontrolü ile başlat
        function waitForScripts() {
            return new Promise((resolve) => {
                // genel_veriler.js yüklenene kadar bekle
                const checkScripts = setInterval(() => {
                    if (typeof lokasyonVeritabani !== 'undefined' && typeof marketZincirleri !== 'undefined') {
                        clearInterval(checkScripts);
                        console.log('✅ Tüm scriptler yüklendi');
                        resolve();
                    }
                }, 100);
                
                // 5 saniye sonra timeout (scriptler yüklenemezse devam et)
                setTimeout(() => {
                    clearInterval(checkScripts);
                    if (typeof lokasyonVeritabani === 'undefined') {
                        console.warn('⚠️ lokasyonVeritabani yüklenemedi');
                    }
                    if (typeof marketZincirleri === 'undefined') {
                        console.warn('⚠️ marketZincirleri yüklenemedi');
                    }
                    resolve();
                }, 5000);
            });
        }

        document.addEventListener('DOMContentLoaded', async function() {

            await waitForScripts();
            
            // UI'ı başlat
            try {
                renderCountryChips();
                await loadMarketChains();

        // --- ÜLKE SEÇİMİ ---
        function renderCountryChips() {
            const container = document.getElementById('countryChips');
            if (!container) return;
            
            container.innerHTML = '';
            
            // Alfabetik sırala
            const sortedCountries = Object.keys(lokasyonVeritabani).sort((a, b) => 
                lokasyonVeritabani[a].isim.localeCompare(lokasyonVeritabani[b].isim, 'tr')
            );
            
            sortedCountries.forEach(code => {
                const country = lokasyonVeritabani[code];
                const chip = document.createElement('button');
                chip.className = `country-chip flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs md:text-sm font-bold whitespace-nowrap ${
                    code === selectedCountry 
                        ? 'active shadow-lg' 
                        : 'bg-white/10 text-white hover:bg-white/20'
                }`;
                chip.innerHTML = `${country.bayrak} ${country.isim}`;
                chip.onclick = () => selectCountry(code);
                container.appendChild(chip);
            });
        }

        function selectCountry(code) {
            selectedCountry = code;
            renderCountryChips();
            renderMarketGrid();
        }

        // --- KONUM TESPİTİ ---
        function detectLocation() {
            if (!navigator.geolocation) {
                Swal.fire('Hata', 'Tarayıcınız konum desteği sunmuyor.', 'error');
                return;
            }
            
            Swal.fire({
                title: 'Konum Tespit Ediliyor...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    try {
                        const { latitude, longitude } = position.coords;
                        
                        // Nominatim ile reverse geocoding
                        const response = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=tr`,
                            { headers: { 'User-Agent': 'PlatformAvrupa/1.0' } }
                        );
                        const data = await response.json();
                        
                        // Ülke kodunu bul
                        const countryCode = data.address?.country_code?.toUpperCase();
                        const city = data.address?.city || data.address?.town || data.address?.village || '';
                        
                        if (countryCode && lokasyonVeritabani[countryCode]) {
                            selectCountry(countryCode);
                            Swal.fire({
                                icon: 'success',
                                title: 'Konum Tespit Edildi!',
                                html: `<strong>${city}</strong>, ${lokasyonVeritabani[countryCode].bayrak} ${lokasyonVeritabani[countryCode].isim}`,
                                timer: 2000,
                                showConfirmButton: false
                            });
                        } else {
                            Swal.fire('Bilgi', 'Konumunuz desteklenen ülkeler arasında değil.', 'info');
                        }
                    } catch (err) {
                        console.error(err);
                        Swal.fire('Hata', 'Konum tespit edilemedi.', 'error');
                    }
                },
                (error) => {
                    Swal.fire('Hata', 'Konum erişimi reddedildi.', 'error');
                }
            );
        }

        // --- OTOMATİK KONUM TESPİTİ (SESSİZ) ---
        function autoDetectLocation() {
            if (!navigator.geolocation) {
                return; // Sessizce çık
            }
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    try {
                        const { latitude, longitude } = position.coords;
                        
                        // Nominatim ile reverse geocoding
                        const response = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=tr`,
                            { headers: { 'User-Agent': 'PlatformAvrupa/1.0' } }
                        );
                        const data = await response.json();
                        
                        // Ülke kodunu bul
                        const countryCode = data.address?.country_code?.toUpperCase();
                        
                        if (countryCode && lokasyonVeritabani[countryCode]) {
                            selectCountry(countryCode);
                            console.log(`✅ Otomatik konum tespit edildi: ${lokasyonVeritabani[countryCode].isim}`);
                        }
                    } catch (err) {
                        console.warn('⚠️ Otomatik konum tespiti başarısız:', err);
                    }
                },
                (error) => {
                    // Kullanıcı izin vermedi veya hata oluştu - sessizce devam et
                    console.log('ℹ️ Konum erişimi reddedildi veya kullanılamıyor');
                }
            );
        }

        // --- MARKET ZİNCİRLERİ ---
        async function loadMarketChains() {
            console.log('📦 Market zincirleri yükleniyor...');
            
            // Loading göster
            const grid = document.getElementById('marketGrid');
            if (grid) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="glass-card p-8 inline-block">
                            <div class="w-16 h-16 bg-gradient-to-br from-emerald-100 to-teal-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-spinner fa-spin text-3xl text-emerald-500"></i>
                            </div>
                            <p class="text-slate-600 text-sm">Market verileri yükleniyor...</p>
                        </div>
                    </div>
                `;
            }
            
            // Önce Supabase'den dene
            if (sb) {
                try {
                    console.log('🔍 Supabase\'den market zincirleri deneniyor...');
                    const { data, error } = await sb
                        .from('market_chains')
                        .select('*')
                        .order('name');
                    
                    if (!error && data && data.length > 0) {
                        marketChains = data;
                        console.log(`✅ ${marketChains.length} market zinciri Supabase'den yüklendi`);
                        renderMarketGrid();
                        return;
                    } else {
                        console.warn('⚠️ Supabase\'de market zinciri bulunamadı, fallback kullanılıyor');
                    }
                } catch (err) {
                    console.warn('⚠️ Supabase market zincirleri yüklenemedi, fallback kullanılıyor:', err);
                }
            } else {
                console.log('ℹ️ Supabase bağlantısı yok, fallback kullanılıyor');
            }
            
            // Fallback: genel_veriler.js'deki marketZincirleri kullan
            if (typeof marketZincirleri !== 'undefined' && marketZincirleri) {
                console.log('📦 genel_veriler.js\'den market zincirleri yükleniyor...');
                marketChains = [];
                
                for (const [countryCode, countryData] of Object.entries(marketZincirleri)) {
                    if (countryData && countryData.marketler && Array.isArray(countryData.marketler)) {
                        countryData.marketler.forEach(market => {
                            // Aynı market birden fazla ülkede olabilir
                            const existing = marketChains.find(m => m.name === market.isim);
                            if (existing) {
                                if (!existing.countries.includes(countryCode)) {
                                    existing.countries.push(countryCode);
                                }
                            } else {
                                marketChains.push({
                                    name: market.isim,
                                    logo_url: market.logo || null,
                                    countries: [countryCode],
                                    brochure_url: market.brosur || '#',
                                    website: market.brosur ? market.brosur.split('/').slice(0, 3).join('/') : '#'
                                });
                            }
                        });
                    }
                }
                console.log(`✅ ${marketChains.length} market zinciri yüklendi (fallback: genel_veriler.js)`);
            } else {
                console.error('❌ marketZincirleri bulunamadı veya tanımsız');
                marketChains = [];
                
                // Kullanıcıya hata mesajı göster
                if (grid) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <div class="glass-card p-8 inline-block max-w-md">
                                <div class="w-20 h-20 bg-gradient-to-br from-red-100 to-pink-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                    <i class="fa-solid fa-exclamation-triangle text-3xl text-red-500"></i>
                                </div>
                                <h4 class="font-bold text-slate-800 text-lg mb-2">Veri Yüklenemedi</h4>
                                <p class="text-slate-600 text-sm mb-4">Market verileri bulunamadı. Lütfen sayfayı yenileyin veya internet bağlantınızı kontrol edin.</p>
                                <button onclick="location.reload()" class="bg-gradient-to-r from-red-500 to-pink-500 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition shadow-lg">
                                    <i class="fa-solid fa-rotate"></i> Sayfayı Yenile
                                </button>
                            </div>
                        </div>
                    `;
                }
                return;
            }
            
            renderMarketGrid();
        }

        // --- BROŞÜR URL OLUŞTURMA ---
        function getBrochureUrl(market, countryCode) {
            // Market adını URL-friendly hale getir
            function urlifyMarketName(name) {
                return name
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '') // Türkçe karakterleri düzelt
                    .replace(/ş/g, 's')
                    .replace(/ç/g, 'c')
                    .replace(/ğ/g, 'g')
                    .replace(/ü/g, 'u')
                    .replace(/ö/g, 'o')
                    .replace(/ı/g, 'i')
                    .replace(/[^a-z0-9]+/g, '-') // Özel karakterleri tire ile değiştir
                    .replace(/^-+|-+$/g, ''); // Başta ve sonda tireleri kaldır
            }
            
            const marketSlug = urlifyMarketName(market.name);
            
            // Ülkeye göre agregator URL'i oluştur
            let aggregatorUrl = null;
            
            switch (countryCode) {
                case 'DE':
                    aggregatorUrl = `https://www.kaufda.de/${marketSlug}`;
                    break;
                case 'AT':
                    aggregatorUrl = `https://www.wogibtswas.at/${marketSlug}`;
                    break;
                case 'BE':
                    aggregatorUrl = `https://www.folder.be/${marketSlug}`;
                    break;
                case 'NL':
                    aggregatorUrl = `https://www.reclamefolder.nl/${marketSlug}`;
                    break;
                case 'FR':
                    aggregatorUrl = `https://www.bonial.fr/${marketSlug}`;
                    break;
                case 'DK':
                    aggregatorUrl = `https://www.tilbudsavis.dk/${marketSlug}`;
                    break;
                case 'TR':
                    aggregatorUrl = `https://www.aktuelkatolog.com/${marketSlug}`;
                    break;
                case 'ES':
                case 'IT':
                case 'PT':
                case 'PL':
                case 'CZ':
                case 'HU':
                case 'RO':
                case 'BG':
                case 'GR':
                case 'HR':
                case 'SI':
                case 'SK':
                case 'CH':
                case 'SE':
                case 'NO':
                case 'FI':
                case 'EE':
                case 'LV':
                case 'LT':
                case 'LU':
                case 'IE':
                case 'GB':
                case 'MT':
                    // Tiendeo için ülke kodunu küçük harfe çevir
                    const tiendeoCountryCode = countryCode.toLowerCase();
                    aggregatorUrl = `https://www.tiendeo.com/${tiendeoCountryCode}/${marketSlug}`;
                    break;
                default:
                    // Agregator yok, fallback kullan
                    break;
            }
            
            // Önce mevcut brochure_url'i kullan (zaten çalışan linkler)
            if (market.brochure_url && market.brochure_url !== '#' && market.brochure_url !== '') {
                return market.brochure_url;
            }
            
            // Fallback: Agregator URL'i oluştur (varsa)
            if (aggregatorUrl) {
                return aggregatorUrl;
            }
            
            // Son fallback: Market ana sayfası (website)
            return market.website || '#';
        }

        function renderMarketGrid() {
            const grid = document.getElementById('marketGrid');
            if (!grid) {
                console.error('❌ marketGrid elementi bulunamadı');
                return;
            }
            
            // Market zincirleri kontrolü
            if (!marketChains || marketChains.length === 0) {
                console.warn('⚠️ Market zincirleri boş, yükleniyor...');
                loadMarketChains();
                return;
            }
            
            // Seçili ülkedeki marketleri filtrele
            const filteredMarkets = marketChains.filter(m => 
                m && m.countries && Array.isArray(m.countries) && m.countries.includes(selectedCountry)
            );
            
            console.log(`📊 ${filteredMarkets.length} market bulundu (${selectedCountry})`);
            
            if (filteredMarkets.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="glass-card p-8 inline-block max-w-md">
                            <div class="w-20 h-20 bg-gradient-to-br from-emerald-100 to-teal-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-store text-3xl text-emerald-500"></i>
                            </div>
                            <h4 class="font-bold text-slate-800 text-lg mb-2">Bu ülke için market verisi henüz eklenmedi</h4>
                            <p class="text-slate-600 text-sm mb-4">Tüm broşürleri görmek için aşağıdaki linke tıklayın</p>
                            <a href="${brochureAgregators[selectedCountry] || 'https://www.tiendeo.com'}" target="_blank" 
                               class="inline-flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition shadow-lg">
                                <i class="fa-solid fa-external-link"></i> Tümünü Gör
                            </a>
                        </div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = '';
            filteredMarkets.forEach((market, index) => {
                try {
                    const card = document.createElement('a');
                    const brochureUrl = getBrochureUrl(market, selectedCountry);
                    card.href = brochureUrl || '#';
                    card.target = '_blank';
                    card.className = 'market-card block';
                    
                    // Gradient renkler (her market için farklı)
                    const gradients = [
                        'from-emerald-50 to-teal-50',
                        'from-blue-50 to-cyan-50',
                        'from-purple-50 to-pink-50',
                        'from-orange-50 to-red-50',
                        'from-yellow-50 to-amber-50',
                        'from-indigo-50 to-blue-50'
                    ];
                    const gradientIndex = index % gradients.length;
                    const gradient = gradients[gradientIndex];
                    
                    // Market adını güvenli hale getir; logo: önce veritabanı, yoksa MARKET_LOGOS
                    const marketName = market.name || 'Market';
                    const safeMarketName = marketName.replace(/[<>]/g, '');
                    const logoUrl = market.logo_url || MARKET_LOGOS[marketName] || '';
                    
                    card.innerHTML = `
                        <div class="p-5 text-center">
                            <div class="w-20 h-20 bg-gradient-to-br ${gradient} rounded-3xl flex items-center justify-center mx-auto mb-4 overflow-hidden shadow-lg">
                                ${logoUrl 
                                    ? `<img src="${logoUrl}" alt="${safeMarketName}" class="w-16 h-16 object-contain p-2" onerror="this.parentElement.innerHTML='<div class=\\'w-16 h-16 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex items-center justify-center\\'><i class=\\'fa-solid fa-store text-2xl text-white\\'></i></div>'">`
                                    : `<div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex items-center justify-center">
                                        <i class="fa-solid fa-store text-2xl text-white"></i>
                                       </div>`
                                }
                            </div>
                            <h4 class="font-bold text-slate-800 text-base mb-2 truncate">${safeMarketName}</h4>
                            <div class="flex items-center justify-center gap-2 text-emerald-600 font-semibold text-sm">
                                <span>Broşüre Git</span>
                                <i class="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                } catch (error) {
                    console.error(`❌ Market kartı oluşturma hatası (${market.name}):`, error);
                }
            });
            
            console.log(`✅ ${filteredMarkets.length} market kartı oluşturuldu`);
        }

    </script>
</body>
</html>
