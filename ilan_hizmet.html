    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Modern Input & Select */
        .modern-input, .modern-select, .modern-textarea {
            width: 100%; background-color: #ffffff; border: 1px solid #e2e8f0; 
            border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #334155; 
            outline: none; transition: all 0.2s;
        }
        .modern-input:focus, .modern-select:focus, .modern-textarea:focus {
            border-color: #0891b2; box-shadow: 0 0 0 4px rgba(8, 145, 178, 0.1);
        }
        
        /* Seçim Butonları (Cyan Tema) */
        .rol-btn { 
            border: 2px solid #e2e8f0; background-color: white; color: #64748b; 
            cursor: pointer; transition: all 0.2s; border-radius: 16px;
        }
        .rol-btn:hover { border-color: #67e8f9; background-color: #ecfeff; }
        .rol-btn.active { 
            background-color: #ecfeff; border-color: #0891b2; color: #0e7490; 
            box-shadow: 0 4px 10px -2px rgba(8, 145, 178, 0.2); 
        }
    </style>

<body class="text-slate-800 flex flex-col min-h-screen">
    
    <nav class="bg-white/90 backdrop-blur border-b border-slate-200 sticky top-0 z-50 px-4 py-4 shadow-sm">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="ilan_giris.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 hover:bg-slate-100 text-slate-600 transition">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <span class="font-extrabold text-lg text-slate-800 tracking-tight">HİZMET İLANI OLUŞTUR</span>
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-8 w-full">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200">
            <form onsubmit="ilanGonder(event)" id="hizmetIlanFormu" class="space-y-6" novalidate>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="rolSec('veren', this)" class="rol-btn active p-5 text-center flex flex-col items-center justify-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-cyan-100 flex items-center justify-center text-cyan-600 text-xl"><i class="fa-solid fa-toolbox"></i></div>
                        <span class="font-bold text-sm">Hizmet Veren (Usta)</span>
                    </div>
                    <div onclick="rolSec('alan', this)" class="rol-btn p-5 text-center flex flex-col items-center justify-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 text-xl"><i class="fa-solid fa-hand-holding-hand"></i></div>
                        <span class="font-bold text-sm">Hizmet Arayan</span>
                    </div>
                </div>
                <input type="hidden" id="ilanRolu" value="veren">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Ülke</label>
                        <select id="ulkeSelect" onchange="ulkeDegisti()" class="modern-select">
                            <option value="">Ülke Seçiniz...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Şehir</label>
                        <select id="sehirSelect" disabled class="modern-select opacity-60 cursor-not-allowed">
                            <option value="">Önce Ülke Seçin</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Hizmet Kategorisi</label>
                        <select id="kategori" class="modern-select">
                            <option value="">Seçiniz...</option>
                            <option value="Tadilat & Boya">Tadilat & Boya</option>
                            <option value="Elektrik & Tesisat">Elektrik & Tesisat</option>
                            <option value="Nakliye & Taşıma">Nakliye & Taşıma</option>
                            <option value="Temizlik">Temizlik</option>
                            <option value="Tamir & Bakım">Tamir & Bakım</option>
                            <option value="Bahçe & Peyzaj">Bahçe & Peyzaj</option>
                            <option value="Özel Ders">Özel Ders</option>
                            <option value="Bakıcılık">Bakıcılık</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Ücret Bilgisi</label>
                        <input type="text" id="ucret" placeholder="Örn: 20€/Saat veya Teklif" class="modern-input font-bold text-cyan-800">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">İlan Başlığı</label>
                        <input type="text" id="baslik" placeholder="Örn: Profesyonel Boya Badana" class="modern-input" required>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Telefon Numarası</label>
                        <div class="flex gap-2">
                            <select id="telKod" class="modern-select w-1/3 text-center px-1">
                                <option value="">Kod</option>
                            </select>
                            <input type="tel" id="telNo" placeholder="555 123 45 67" class="modern-input w-2/3">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Hizmet Detayları</label>
                    <textarea id="aciklama" rows="5" placeholder="Yaptığınız işler, tecrübeniz veya aradığınız hizmet hakkında detaylar..." class="modern-textarea resize-none"></textarea>
                </div>

                <div class="pt-6">
                    <button type="submit" id="gonderButton" class="bg-cyan-600 text-white font-bold py-4 rounded-2xl text-lg shadow-lg shadow-cyan-200 hover:bg-cyan-700 transition w-full active:scale-95 flex items-center justify-center gap-3">
                        <span>İlanı Yayınla</span> <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="genel_veriler.js"></script>
    <script>
        // sb config.js tarafından tanımlandı

        // --- 2. SAYFA YÜKLENİNCE ---
        window.onload = function() {
            if (typeof ulkeleriDoldur === 'function') {
                ulkeleriDoldur('ulkeSelect');
                telefonKodlariniDoldur('telKod');
            }
        };

        // --- 3. FONKSİYONLAR ---
        function telefonKodlariniDoldur(selectId) {
            const select = document.getElementById(selectId);
            if (!select || typeof lokasyonVeritabani === 'undefined') return;
            select.innerHTML = '<option value="">Kod</option>';
            Object.keys(lokasyonVeritabani).forEach(kod => {
                const ulke = lokasyonVeritabani[kod];
                if (ulke.tel) {
                    const opt = document.createElement('option');
                    opt.value = ulke.tel;
                    opt.text = `${ulke.bayrak} ${ulke.tel}`;
                    if(kod === 'DE') opt.selected = true;
                    select.add(opt);
                }
            });
        }

        function ulkeDegisti() {
            const ulkeKod = document.getElementById('ulkeSelect').value;
            if (typeof sehirleriGetirOrtak === 'function') {
                sehirleriGetirOrtak(ulkeKod, 'sehirSelect');
                const sehirBox = document.getElementById('sehirSelect');
                sehirBox.disabled = false;
                sehirBox.classList.remove('opacity-60', 'cursor-not-allowed');
            }
            if (ulkeKod && lokasyonVeritabani[ulkeKod]) {
                document.getElementById('telKod').value = lokasyonVeritabani[ulkeKod].tel;
            }
        }

        function rolSec(rol, btn) {
            document.querySelectorAll('.rol-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('ilanRolu').value = rol;
        }

        async function ilanGonder(e) {
            e.preventDefault();

            // ZORUNLU ALAN KONTROLÜ
            const gerekli = [
                {id: 'ulkeSelect', msg: 'Lütfen Ülke seçiniz.'},
                {id: 'sehirSelect', msg: 'Lütfen Şehir seçiniz.'},
                {id: 'telKod', msg: 'Lütfen Telefon Kodu seçiniz.'},
                {id: 'telNo', msg: 'Lütfen Telefon Numarası giriniz.'},
                {id: 'kategori', msg: 'Lütfen Hizmet Kategorisi seçiniz.'},
                {id: 'baslik', msg: 'Lütfen İlan Başlığı giriniz.'},
                {id: 'aciklama', msg: 'Lütfen Açıklama giriniz.'}
            ];

            for (let item of gerekli) {
                const el = document.getElementById(item.id);
                if(!el || !el.value.trim()) {
                    alert(item.msg);
                    if(el) el.focus();
                    return;
                }
            }

            const btn = document.getElementById('gonderButton');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Kaydediliyor...';
            btn.disabled = true;

            // Verileri Topla
            const ulkeSelect = document.getElementById('ulkeSelect');
            const sehirAdi = document.getElementById('sehirSelect').value;
            const tamTelefon = document.getElementById('telKod').value + " " + document.getElementById('telNo').value;

            // Koordinat Bulma
            let lat = 48.8566, lon = 2.3522;
            try {
                const query = `${sehirAdi}, ${ulkeSelect.value}`;
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if(data && data.length > 0) {
                    lat = parseFloat(data[0].lat);
                    lon = parseFloat(data[0].lon);
                }
            } catch (err) {}

            const form = {
                rol: document.getElementById('ilanRolu').value,
                ulkeKod: ulkeSelect.value,
                sehir: sehirAdi,
                kategori: document.getElementById('kategori').value,
                ucret: document.getElementById('ucret').value || "Belirtilmedi",
                baslik: document.getElementById('baslik').value,
                aciklama: document.getElementById('aciklama').value
            };

            const yeniIlan = {
                id: Date.now(),
                baslik: form.baslik,
                kategori: 'hizmet', // Vitrinle uyumlu (küçük harf)
                role: form.rol, // veren / alan
                
                // Filtreleme Anahtarları
                konum: form.sehir,
                sehir: form.sehir,
                ulke: form.ulkeKod,
                sektor: form.kategori, 
                
                fiyat: form.ucret,
                aciklama: form.aciklama,
                telefon: tamTelefon,
                lat: lat, lon: lon,
                
                resim: "https://images.unsplash.com/photo-1581578731117-10d52143b0d8?q=80&w=400",
                tarih: "Şimdi"
            };

            // Supabase & LocalStorage
            try {
                if (sb && typeof sb.from === 'function') await sb.from('ilanlar').insert([yeniIlan]);
            } catch (err) { console.error(err); }

            // ✅ localStorage temizlendi - Artık sadece Supabase
            localData.unshift(yeniIlan);
            localStorage.setItem('posted_ads_hizmet', JSON.stringify(localData));

            setTimeout(() => {
                alert("✅ Hizmet ilanınız başarıyla yayınlandı!");
                window.location.href = 'hizmet_vitrini.html';
            }, 1000);
        }
    </script>
</body>
</html>
