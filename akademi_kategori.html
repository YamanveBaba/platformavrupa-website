<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori | Platform Akademi - PlatformAvrupa</title>
    <meta name="description" content="Kategori bazlı eğitim videoları. Dil, kariyer, finans, resmi işlemler ve daha fazlası.">
    <link rel="canonical" href="https://www.platformavrupa.com/akademi_kategori.html">
    <meta property="og:title" content="Kategori | Platform Akademi - PlatformAvrupa">
    <meta property="og:description" content="Kategori bazlı eğitim videoları. Avrupa'daki Türkler için ücretsiz eğitim içerikleri.">
    <meta property="og:url" content="https://www.platformavrupa.com/akademi_kategori.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Platform Avrupa">
    <meta property="og:image" content="https://www.platformavrupa.com/og-image.png">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Kategori | Platform Akademi - PlatformAvrupa">
    <meta name="twitter:description" content="Kategori bazlı eğitim videoları.">
    <meta name="twitter:image" content="https://www.platformavrupa.com/og-image.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        
        .glass-header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .series-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .series-card:hover {
            border-color: rgba(139, 92, 246, 0.5);
        }
        .series-card.active {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }
        
        .video-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-3px);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .video-card:hover .play-btn {
            transform: scale(1.1);
            background: #8b5cf6;
        }
        
        .skeleton { 
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); 
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite; 
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #3b82f6); transition: width 0.3s; }
        
        /* YouTube tarzı oynatma listesi kartı */
        .playlist-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .playlist-card {
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }
        .playlist-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 12px 28px rgba(0,0,0,0.35);
        }
        /* Stacked thumbnail efekti (oynatma listesi hissi - içinde birden fazla video vurgusu) */
        .playlist-thumb-wrap {
            position: relative;
            overflow: visible;
        }
        .playlist-thumb-wrap .playlist-thumb-stack {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            border-radius: inherit;
            z-index: 0;
        }
        .playlist-thumb-wrap .playlist-thumb-stack:nth-child(1) {
            transform: translate(6px, 6px);
            opacity: 0.6;
            filter: brightness(0.6);
        }
        .playlist-thumb-wrap .playlist-thumb-stack:nth-child(2) {
            transform: translate(12px, 12px);
            opacity: 0.4;
            filter: brightness(0.4);
        }
        .playlist-thumb-wrap .playlist-thumb-wrap-img {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <nav class="glass-header sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="akademi.html" class="flex items-center gap-3 group">
                    <div class="w-9 h-9 bg-white/10 rounded-lg flex items-center justify-center text-white group-hover:bg-purple-600 transition">
                        <i class="fa-solid fa-arrow-left"></i>
                    </div>
                    <span class="font-bold text-lg">Platform <span class="text-purple-400">Akademi</span></span>
                </a>
                
                <div class="flex items-center gap-3">
                    <div class="relative hidden sm:block">
                        <input type="text" id="searchInput" placeholder="Bu kategoride ara..." 
                               class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 pl-10 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-purple-500 w-56 transition"
                               oninput="searchVideos(this.value)">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- KATEGORİ HEADER -->
    <section id="categoryHeader" class="py-12 px-4 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br opacity-20" id="headerGradient"></div>
        <div class="max-w-7xl mx-auto relative z-10">
            <div class="flex items-center gap-4 mb-4">
                <div id="categoryIcon" class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl skeleton">
                    <i class="fa-solid fa-book"></i>
                </div>
                <div>
                    <h1 id="categoryName" class="text-3xl font-extrabold">Yükleniyor...</h1>
                    <p id="categoryDesc" class="text-slate-400 mt-1"></p>
                </div>
            </div>
            
            <div class="flex items-center gap-6 text-sm text-slate-400 mt-4">
                <span id="videoCount"><i class="fa-solid fa-play-circle mr-1"></i> -- video</span>
                <span id="seriesCount"><i class="fa-solid fa-layer-group mr-1"></i> -- seri</span>
            </div>
        </div>
    </section>

    <!-- İÇERİK -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <!-- Sırala seçenekleri kaldırıldı: videolar otomatik olarak varsayılan düzende sıralanıyor -->

        <!-- Seri seçiliyken: Serilere dön + Banner + Video grid -->
        <div id="seriesDetailView" class="hidden">
            <button type="button" onclick="clearSeriesFilter()" class="flex items-center gap-2 text-slate-400 hover:text-white mb-4 transition text-sm">
                <i class="fa-solid fa-arrow-left"></i> Serilere dön
            </button>
            <div id="activeSeries" class="bg-gradient-to-r from-purple-900/50 to-blue-900/50 rounded-2xl p-6 mb-6 border border-purple-500/30">
                <div class="flex items-center justify-between flex-wrap gap-4">
                    <div>
                        <span class="text-purple-300 text-xs font-bold uppercase tracking-wider">Seri</span>
                        <h3 id="activeSeriesName" class="text-xl font-bold text-white"></h3>
                        <p id="activeSeriesDesc" class="text-slate-400 text-sm mt-1"></p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <span class="text-slate-400 text-xs">İlerleme</span>
                            <p id="seriesProgress" class="text-white font-bold">0 / 0</p>
                        </div>
                        <button onclick="clearSeriesFilter()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-sm transition">
                            <i class="fa-solid fa-xmark mr-1"></i> Filtreyi Kaldır
                        </button>
                    </div>
                </div>
                <div class="progress-bar mt-4">
                    <div id="seriesProgressBar" class="progress-bar-fill" style="width: 0%"></div>
                </div>
            </div>
            <div id="videoGrid" class="space-y-3"></div>
        </div>

        <!-- Seri seçili değilken: Oynatma listeleri grid + Tekli videolar -->
        <div id="playlistOverview">
            <!-- Seriler (YouTube oynatma listesi tarzı kartlar) -->
            <section id="seriesPlaylistSection" class="mb-10">
                <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-purple-400"></i> Oynatma listeleri
                </h2>
                <div id="seriesPlaylistGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6">
                    <!-- Seri kartları JS ile doldurulacak -->
                </div>
                <div id="noSeriesMsg" class="hidden text-center py-8 text-slate-400">
                    <i class="fa-solid fa-folder-open text-2xl mb-2 block"></i>
                    Bu kategoride seri yok.
                </div>
            </section>
            <!-- Tekli videolar -->
            <section id="standaloneVideosSection">
                <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-video text-purple-400"></i> Tekli videolar
                </h2>
                <div id="standaloneVideosGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                <div id="noStandaloneMsg" class="hidden text-center py-8 text-slate-400">
                    Seri dışı video yok.
                </div>
            </section>
        </div>

        <!-- Empty State (tüm kategori boş) -->
        <div id="noVideos" class="hidden text-center py-16">
            <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl text-slate-500">
                <i class="fa-solid fa-video-slash"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">Bu Kategoride Video Yok</h3>
            <p class="text-slate-400">Çok yakında yeni videolar eklenecek.</p>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-white/5 py-8 text-center text-slate-500 text-sm mt-auto">
        <p>&copy; 2026 Platform Avrupa Akademi</p>
    </footer>

    <!-- VİDEO MODAL -->
    <div id="videoModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/95 backdrop-blur-md">
        <div class="relative w-full max-w-5xl mx-4">
            <div class="flex absolute -top-12 right-0 gap-2">
                <button onclick="closeVideoModal()" class="text-white hover:text-purple-400 font-bold flex items-center gap-2 transition px-3 py-1.5 rounded-lg hover:bg-white/10">
                    <i class="fa-solid fa-list"></i> Listeye dön
                </button>
                <button onclick="closeVideoModal()" class="text-white hover:text-red-400 font-bold flex items-center gap-2 transition px-3 py-1.5 rounded-lg hover:bg-white/10">
                    <i class="fa-solid fa-xmark text-xl"></i> Kapat
                </button>
            </div>
            <div class="aspect-video w-full bg-black rounded-2xl overflow-hidden shadow-2xl relative">
                <iframe id="youtubePlayer" class="w-full h-full" src="" frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        referrerpolicy="strict-origin-when-cross-origin"></iframe>
            </div>

            <!-- Önerilen videolar: oynatıcının altında, sitede kalan liste -->
            <div class="mt-4">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Önerilen videolar</p>
                <div id="modalRecommendedVideos" class="flex gap-2 overflow-x-auto pb-1 scrollbar-thin" style="scrollbar-width: thin;">
                    <!-- JS ile doldurulacak; butonlara pointer-events-auto verilir -->
                </div>
            </div>
            
            <!-- Video Bilgileri -->
            <div class="mt-4 flex flex-col md:flex-row gap-4">
                <div class="flex-grow">
                    <h3 id="videoTitle" class="text-xl font-bold text-white"></h3>
                    <p id="videoDescription" class="text-slate-400 text-sm mt-2"></p>
                </div>
                
                <!-- Seri Navigasyonu -->
                <div id="seriesNav" class="hidden flex-shrink-0 flex items-center gap-3">
                    <button id="prevVideo" onclick="playPreviousVideo()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-chevron-left mr-1"></i> Önceki
                    </button>
                    <span id="videoPosition" class="text-slate-400 text-sm">1 / 5</span>
                    <button id="nextVideo" onclick="playNextVideo()" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Sonraki <i class="fa-solid fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>
            
            <!-- Aksiyon Butonları -->
            <div class="mt-4 flex items-center gap-4">
                <button onclick="likeVideo()" id="likeBtn" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-sm transition flex items-center gap-2">
                    <i class="fa-regular fa-heart"></i> <span id="likeCount">0</span>
                </button>
                <button onclick="reportProblem()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-sm transition flex items-center gap-2">
                    <i class="fa-solid fa-flag"></i> Sorun Bildir
                </button>
                <button onclick="shareVideo()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-sm transition flex items-center gap-2">
                    <i class="fa-solid fa-share-nodes"></i> Paylaş
                </button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script>
        let category = null;
        let allSeries = [];
        let allVideos = [];
        let filteredVideos = [];
        let flatVideoList = [];
        let expandedSeriesSet = new Set();
        let currentVideoIndex = 0;
        let currentSeriesId = null;
        let standaloneVideoList = [];
        const SERI_YOK_KEY = 'none';

        // Serideki ilk videoyu bul (thumbnail için; listeleme sırası artan: en küçük series_order = ilk ders)
        function getFirstVideoForSeries(seriesId) {
            const inSeries = allVideos.filter(v => v.series_id === seriesId);
            if (inSeries.length === 0) return null;
            const sorted = [...inSeries].sort((a, b) => (a.series_order || 0) - (b.series_order || 0));
            return sorted[0];
        }

        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            
            if (!slug) {
                window.location.href = 'akademi.html';
                return;
            }
            
            await loadCategory(slug);
        });

        // Kategori yükle
        async function loadCategory(slug) {
            try {
                // Kategori bilgisi
                const { data: catData, error: catError } = await sb
                    .from('academy_categories')
                    .select('*')
                    .eq('slug', slug)
                    .single();
                
                if (catError || !catData) {
                    window.location.href = 'akademi.html';
                    return;
                }
                
                category = catData;
                renderCategoryHeader();
                
                // Serileri yükle
                const { data: seriesData } = await sb
                    .from('academy_series')
                    .select('*')
                    .eq('category_id', category.id)
                    .eq('is_active', true)
                    .order('sort_order');
                
                allSeries = seriesData || [];
                
                // Videoları yükle
                const { data: videoData } = await sb
                    .from('academy_videos')
                    .select('*, academy_series(name)')
                    .eq('category_id', category.id)
                    .eq('is_active', true)
                    .order('created_at', { ascending: false });
                
                allVideos = videoData || [];
                filteredVideos = [...allVideos];
                
                // İstatistikleri güncelle
                document.getElementById('videoCount').innerHTML = `<i class="fa-solid fa-play-circle mr-1"></i> ${allVideos.length} video`;
                document.getElementById('seriesCount').innerHTML = `<i class="fa-solid fa-layer-group mr-1"></i> ${allSeries.length} seri`;
                
                // Görünüm: seri seçili değilse oynatma listeleri + tekli videolar
                document.getElementById('noVideos').classList.add('hidden');
                if (allVideos.length === 0) {
                    document.getElementById('playlistOverview').classList.add('hidden');
                    document.getElementById('seriesDetailView').classList.add('hidden');
                    document.getElementById('noVideos').classList.remove('hidden');
                } else {
                    document.getElementById('playlistOverview').classList.remove('hidden');
                    document.getElementById('seriesDetailView').classList.add('hidden');
                    renderSeriesPlaylistGrid();
                    renderStandaloneVideos();
                }
                
                // Sayfa başlığını güncelle
                document.title = `${category.name} | Platform Akademi`;
                
            } catch (err) {
                console.error('Kategori yükleme hatası:', err);
            }
        }

        // Kategori header render
        function renderCategoryHeader() {
            const iconEl = document.getElementById('categoryIcon');
            const nameEl = document.getElementById('categoryName');
            const descEl = document.getElementById('categoryDesc');
            const gradient = document.getElementById('headerGradient');
            
            iconEl.className = `w-16 h-16 rounded-2xl flex items-center justify-center text-3xl`;
            iconEl.style.backgroundColor = `${category.color}20`;
            iconEl.style.color = category.color;
            iconEl.innerHTML = `<i class="fa-solid ${category.icon}"></i>`;
            
            nameEl.textContent = category.name;
            descEl.textContent = category.description || '';
            
            gradient.style.background = `linear-gradient(135deg, ${category.color}40, transparent)`;
        }

        // YouTube tarzı oynatma listesi kartları (seriler grid)
        function renderSeriesPlaylistGrid() {
            const grid = document.getElementById('seriesPlaylistGrid');
            const noMsg = document.getElementById('noSeriesMsg');
            if (!grid) return;
            
            if (allSeries.length === 0) {
                grid.innerHTML = '';
                if (noMsg) noMsg.classList.remove('hidden');
                return;
            }
            if (noMsg) noMsg.classList.add('hidden');
            
            grid.innerHTML = allSeries.map(series => {
                const firstVideo = getFirstVideoForSeries(series.id);
                const thumbUrl = firstVideo
                    ? (firstVideo.thumbnail_url || `https://img.youtube.com/vi/${firstVideo.youtube_id}/mqdefault.jpg`)
                    : 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg';
                const count = allVideos.filter(v => v.series_id === series.id).length;
                return `
                <div class="playlist-card rounded-2xl overflow-hidden cursor-pointer" onclick="filterBySeries('${series.id}')">
                    <div class="playlist-thumb-wrap relative aspect-video rounded-t-2xl overflow-hidden bg-slate-800">
                        <div class="playlist-thumb-stack rounded-t-2xl" style="background-image: url('${thumbUrl}')"></div>
                        <div class="playlist-thumb-stack rounded-t-2xl" style="background-image: url('${thumbUrl}')"></div>
                        <img src="${thumbUrl}" alt="" class="playlist-thumb-wrap-img w-full h-full object-cover block rounded-t-2xl" loading="lazy">
                        <span class="absolute bottom-2 right-2 z-10 bg-black/80 text-white text-xs font-bold px-2 py-1 rounded backdrop-blur-sm">
                            ${count} video
                        </span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-white line-clamp-2 mb-1">${sanitize(series.name)}</h3>
                        <span class="text-sm text-purple-400 hover:underline">Seriyi görüntüle</span>
                    </div>
                </div>`;
            }).join('');
        }

        // Varsayılan sıralama: seri videoları ders sırasına göre, tekli videolar en yeniye göre
        function applyDefaultSortForSeriesVideos(arr) {
            const a = [...arr];
            a.sort((x, y) => {
                const soX = x.series_order || 0;
                const soY = y.series_order || 0;
                if (soX !== 0 || soY !== 0) {
                    return soX - soY; // 1,2,3... ders sırası
                }
                // Seri bilgisi yoksa created_at'e göre en yeni üstte
                return new Date(y.created_at) - new Date(x.created_at);
            });
            return a;
        }

        // Tekli videolar bölümü (seriye ait olmayan)
        function renderStandaloneVideos() {
            const grid = document.getElementById('standaloneVideosGrid');
            const noMsg = document.getElementById('noStandaloneMsg');
            if (!grid) return;
            
            const standalone = allVideos.filter(v => !v.series_id);
            const sortVids = (arr) => {
                const a = [...arr];
                a.sort((x, y) => new Date(y.created_at) - new Date(x.created_at));
                return a;
            };
            standaloneVideoList = sortVids(standalone);
            
            if (standaloneVideoList.length === 0) {
                grid.innerHTML = '';
                if (noMsg) noMsg.classList.remove('hidden');
                return;
            }
            if (noMsg) noMsg.classList.add('hidden');
            
            grid.innerHTML = standaloneVideoList.map((video, i) => `
                <div onclick="playStandaloneVideo(${i})" class="video-card rounded-2xl overflow-hidden cursor-pointer group">
                    <div class="relative aspect-video">
                        <img src="${video.thumbnail_url || `https://img.youtube.com/vi/${video.youtube_id}/mqdefault.jpg`}" 
                             class="w-full h-full object-cover" loading="lazy">
                        <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <div class="play-btn w-12 h-12 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-white transition">
                                <i class="fa-solid fa-play ml-1"></i>
                            </div>
                        </div>
                        <span class="absolute bottom-2 right-2 bg-black/80 text-white text-xs font-bold px-2 py-1 rounded backdrop-blur-sm">
                            ${formatDuration(video.duration_seconds)}
                        </span>
                        ${video.is_featured ? '<span class="absolute top-2 right-2 bg-orange-500 text-white text-xs px-2 py-1 rounded"><i class="fa-solid fa-star"></i></span>' : ''}
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-white line-clamp-2 group-hover:text-purple-400 transition">${sanitize(video.title)}</h4>
                        <div class="flex items-center gap-3 mt-2 text-xs text-slate-500">
                            <span><i class="fa-solid fa-eye mr-1"></i>${video.view_count || 0}</span>
                            <span><i class="fa-solid fa-heart mr-1"></i>${video.like_count || 0}</span>
                        </div>
                    </div>
                </div>`).join('');
        }

        // Tekli videodan oynat (modal; flatVideoList = standaloneVideoList kullanılır)
        function playStandaloneVideo(index) {
            flatVideoList = standaloneVideoList;
            currentVideoIndex = index;
            playVideo(index);
        }

        // Seriye göre filtrele (Seriyi görüntüle tıklanınca veya Serilere dön)
        function filterBySeries(seriesId) {
            currentSeriesId = seriesId;
            const playlistOverview = document.getElementById('playlistOverview');
            const seriesDetailView = document.getElementById('seriesDetailView');
            
            if (seriesId) {
                filteredVideos = allVideos.filter(v => v.series_id === seriesId);
                filteredVideos = applyDefaultSortForSeriesVideos(filteredVideos);
                const series = allSeries.find(s => s.id === seriesId);
                
                if (playlistOverview) playlistOverview.classList.add('hidden');
                if (seriesDetailView) seriesDetailView.classList.remove('hidden');
                
                if (series) {
                    document.getElementById('activeSeriesName').textContent = series.name;
                    document.getElementById('activeSeriesDesc').textContent = series.description || '';
                    document.getElementById('seriesProgress').textContent = `0 / ${filteredVideos.length}`;
                }
                renderVideos();
            } else {
                filteredVideos = [...allVideos];
                if (playlistOverview) playlistOverview.classList.remove('hidden');
                if (seriesDetailView) seriesDetailView.classList.add('hidden');
                renderSeriesPlaylistGrid();
                renderStandaloneVideos();
            }
        }

        // Filtreyi kaldır
        function clearSeriesFilter() {
            filterBySeries(null);
        }

        // Seri accordion bölümünü aç/kapa (kullanıcı sayfası)
        function toggleSeriesSectionPublic(key) {
            const content = document.getElementById('series-videos-public-' + key);
            const chevron = document.querySelector('[data-series-toggle-public="' + key + '"]');
            if (!content || !chevron) return;
            const isHidden = content.classList.contains('hidden');
            content.classList.toggle('hidden', !isHidden);
            chevron.classList.toggle('rotate-180', !isHidden);
            if (isHidden) expandedSeriesSet.add(key); else expandedSeriesSet.delete(key);
        }

        // Videoları seri bazlı accordion olarak render et
        function renderVideos() {
            const container = document.getElementById('videoGrid');
            const noVideos = document.getElementById('noVideos');
            
            if (filteredVideos.length === 0) {
                container.innerHTML = '';
                noVideos.classList.remove('hidden');
                flatVideoList = [];
                return;
            }
            
            noVideos.classList.add('hidden');
            
            const sortVids = (arr, isSeriesGroup) => {
                const a = [...arr];
                if (isSeriesGroup) {
                    return applyDefaultSortForSeriesVideos(a);
                }
                // Diğer videolar: en yeni üstte
                a.sort((x, y) => new Date(y.created_at) - new Date(x.created_at));
                return a;
            };
            
            const groups = [];
            if (currentSeriesId) {
                const series = allSeries.find(s => s.id === currentSeriesId);
                const vids = sortVids(filteredVideos, true);
                groups.push({ key: currentSeriesId, name: series ? series.name : '', videos: vids });
            } else {
                const bySeries = new Map();
                filteredVideos.forEach(v => {
                    const key = v.series_id || SERI_YOK_KEY;
                    if (!bySeries.has(key)) bySeries.set(key, []);
                    bySeries.get(key).push(v);
                });
                const orderedKeys = allSeries.map(s => s.id).filter(id => bySeries.has(id));
                if (bySeries.has(SERI_YOK_KEY)) orderedKeys.push(SERI_YOK_KEY);
                orderedKeys.forEach(key => {
                    const isSeriesGroup = key !== SERI_YOK_KEY;
                    const vids = sortVids(bySeries.get(key), isSeriesGroup);
                    const name = key === SERI_YOK_KEY ? 'Diğer videolar' : (allSeries.find(s => s.id === key)?.name || 'Seri');
                    groups.push({ key, name, videos: vids });
                });
            }
            
            flatVideoList = groups.flatMap(g => g.videos);
            if (groups.length === 1) expandedSeriesSet = new Set([groups[0].key]);
            else if (groups.length > 0 && expandedSeriesSet.size === 0) expandedSeriesSet.add(groups[0].key);
            
            let flatIndex = 0;
            let html = '';
            groups.forEach((grp, idx) => {
                const isOpen = expandedSeriesSet.has(grp.key);
                const key = (typeof grp.key === 'string' ? grp.key : grp.key).toString();
                html += `
                <div class="series-card rounded-xl overflow-hidden border border-white/10">
                    <button type="button" onclick="toggleSeriesSectionPublic('${key}')" class="w-full flex items-center justify-between gap-4 p-4 text-left hover:bg-white/5 transition min-h-[44px]">
                        <span class="font-bold text-white">${sanitize(grp.name)}</span>
                        <span class="text-slate-400 text-sm">${grp.videos.length} video</span>
                        <i data-series-toggle-public="${key}" class="fa-solid fa-chevron-down text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}"></i>
                    </button>
                    <div id="series-videos-public-${key}" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 p-4 border-t border-white/10 ${isOpen ? '' : 'hidden'}">
                        ${grp.videos.map((video, i) => {
                            const currentFlat = flatIndex++;
                            return `
                        <div onclick="playVideo(${currentFlat})" class="video-card rounded-2xl overflow-hidden cursor-pointer group">
                            <div class="relative aspect-video">
                                <img src="${video.thumbnail_url || `https://img.youtube.com/vi/${video.youtube_id}/mqdefault.jpg`}" 
                                     class="w-full h-full object-cover" loading="lazy">
                                <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                    <div class="play-btn w-12 h-12 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-white transition">
                                        <i class="fa-solid fa-play ml-1"></i>
                                    </div>
                                </div>
                                <span class="absolute bottom-2 right-2 bg-black/80 text-white text-xs font-bold px-2 py-1 rounded backdrop-blur-sm">
                                    ${formatDuration(video.duration_seconds)}
                                </span>
                                ${video.series_id ? `<span class="absolute top-2 left-2 bg-purple-600/90 text-white text-xs font-bold px-2 py-1 rounded">#${video.series_order || ''}</span>` : ''}
                                ${video.is_featured ? '<span class="absolute top-2 right-2 bg-orange-500 text-white text-xs px-2 py-1 rounded"><i class="fa-solid fa-star"></i></span>' : ''}
                            </div>
                            <div class="p-4">
                                <h4 class="font-bold text-white line-clamp-2 group-hover:text-purple-400 transition">${sanitize(video.title)}</h4>
                                ${video.academy_series ? `<span class="text-xs text-purple-400 mt-1 block">${video.academy_series.name}</span>` : ''}
                                <div class="flex items-center gap-3 mt-2 text-xs text-slate-500">
                                    <span><i class="fa-solid fa-eye mr-1"></i>${video.view_count || 0}</span>
                                    <span><i class="fa-solid fa-heart mr-1"></i>${video.like_count || 0}</span>
                                </div>
                            </div>
                        </div>`;
                        }).join('')}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // Video oynat (index flatVideoList içindeki sıraya göre)
        async function playVideo(index) {
            currentVideoIndex = index;
            const list = flatVideoList.length ? flatVideoList : filteredVideos;
            const video = list[index];
            if (!video) return;
            
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('youtubePlayer');
            
            player.src = `https://www.youtube-nocookie.com/embed/${video.youtube_id}?autoplay=1&rel=0`;
            document.getElementById('videoTitle').textContent = video.title;
            document.getElementById('videoDescription').textContent = video.description || '';
            document.getElementById('likeCount').textContent = video.like_count || 0;
            
            // Seri navigasyonu
            const seriesNav = document.getElementById('seriesNav');
            if (video.series_id && list.length > 1) {
                seriesNav.classList.remove('hidden');
                document.getElementById('videoPosition').textContent = `${index + 1} / ${list.length}`;
                document.getElementById('prevVideo').disabled = index === 0;
                document.getElementById('nextVideo').disabled = index === list.length - 1;
            } else {
                seriesNav.classList.add('hidden');
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Önerilen videolar (YouTube "Daha fazla video" yerine sitede kalan liste)
            renderModalRecommendedVideos(list, index);
            
            // İzlenme kaydı
            trackVideoView(video);
        }

        // Modal içi önerilen videolar listesini doldur (tıklanınca sitede oynatılır)
        function renderModalRecommendedVideos(list, currentIndex) {
            const container = document.getElementById('modalRecommendedVideos');
            if (!container) return;
            const others = (list || []).filter((_, i) => i !== currentIndex).slice(0, 8);
            if (others.length === 0) {
                container.innerHTML = '<span class="text-slate-500 text-sm">Başka video yok</span>';
                return;
            }
            container.innerHTML = others.map(v => {
                const idx = list.findIndex(x => x.id === v.id);
                const thumbUrl = v.thumbnail_url || `https://img.youtube.com/vi/${v.youtube_id}/mqdefault.jpg`;
                return `
                <button type="button" onclick="playVideo(${idx})" class="flex-shrink-0 w-28 sm:w-36 rounded-lg overflow-hidden bg-white/5 border border-white/10 hover:border-purple-500/50 transition text-left group pointer-events-auto relative z-10">
                    <div class="aspect-video relative">
                        <img src="${thumbUrl}" alt="" class="w-full h-full object-cover" loading="lazy">
                        <span class="absolute bottom-1 right-1 bg-black/80 text-white text-xs px-1 rounded">${formatDuration(v.duration_seconds)}</span>
                    </div>
                    <p class="p-1.5 text-xs font-medium text-white line-clamp-2 group-hover:text-purple-300">${sanitize(v.title)}</p>
                </button>`;
            }).join('');
        }

        // Önceki video
        function playPreviousVideo() {
            const list = flatVideoList.length ? flatVideoList : filteredVideos;
            if (currentVideoIndex > 0 && list.length) {
                playVideo(currentVideoIndex - 1);
            }
        }

        // Sonraki video
        function playNextVideo() {
            const list = flatVideoList.length ? flatVideoList : filteredVideos;
            if (currentVideoIndex < list.length - 1) {
                playVideo(currentVideoIndex + 1);
            }
        }

        // Video modalını kapat
        function closeVideoModal() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('youtubePlayer');
            
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            player.src = '';
        }

        // İzlenme takibi
        async function trackVideoView(video) {
            if (!sb) return;
            
            try {
                await sb.rpc('increment_video_view', { vid: video.id });
                
                const user = await getCurrentUser();
                await sb.from('academy_views').insert({
                    video_id: video.id,
                    user_id: user?.id || null,
                    session_id: getSessionId()
                });
            } catch (err) {
                console.error('İzlenme takip hatası:', err);
            }
        }

        // Beğen
        async function likeVideo() {
            const list = flatVideoList.length ? flatVideoList : filteredVideos;
            const video = list[currentVideoIndex];
            if (!sb || !video) return;
            
            try {
                await sb.rpc('increment_video_like', { vid: video.id });
                
                const countEl = document.getElementById('likeCount');
                countEl.textContent = parseInt(countEl.textContent) + 1;
                
                document.getElementById('likeBtn').innerHTML = `<i class="fa-solid fa-heart text-red-500"></i> ${countEl.textContent}`;
            } catch (err) {
                console.error('Beğeni hatası:', err);
            }
        }

        // Sorun bildir
        async function reportProblem() {
            const user = await getCurrentUser();
            if (!user) {
                Swal.fire('Giriş Yapın', 'Sorun bildirmek için giriş yapmalısınız.', 'info');
                return;
            }
            
            const list = flatVideoList.length ? flatVideoList : filteredVideos;
            const video = list[currentVideoIndex];
            if (!video) return;
            
            const { value: description } = await Swal.fire({
                title: 'Sorun Bildir',
                input: 'textarea',
                inputPlaceholder: 'Yaşadığınız sorunu açıklayın...',
                showCancelButton: true,
                confirmButtonText: 'Gönder',
                cancelButtonText: 'İptal',
                confirmButtonColor: '#8b5cf6',
                customClass: { popup: 'bg-slate-800 text-white', input: 'bg-slate-700 text-white border-slate-600' }
            });
            
            if (description) {
                await sb.from('academy_requests').insert({
                    user_id: user.id,
                    video_id: video.id,
                    category_id: category.id,
                    request_type: 'problem_report',
                    title: `Sorun: ${video.title}`,
                    description: description
                });
                
                Swal.fire('Teşekkürler', 'Sorun bildiriminiz alındı.', 'success');
            }
        }

        // Paylaş
        function shareVideo() {
            const list = flatVideoList.length ? flatVideoList : filteredVideos;
            const video = list[currentVideoIndex];
            const url = `${window.location.origin}/akademi_video.html?id=${video.id}`;
            
            if (navigator.share) {
                navigator.share({
                    title: video.title,
                    text: `${video.title} - Platform Akademi`,
                    url: url
                });
            } else {
                navigator.clipboard.writeText(url);
                Swal.fire({
                    icon: 'success',
                    title: 'Link Kopyalandı!',
                    timer: 1500,
                    showConfirmButton: false
                });
            }
        }

        // Video ara
        function searchVideos(query) {
            if (!query || query.length < 2) {
                filteredVideos = currentSeriesId 
                    ? allVideos.filter(v => v.series_id === currentSeriesId)
                    : [...allVideos];
            } else {
                const searchVideos = currentSeriesId 
                    ? allVideos.filter(v => v.series_id === currentSeriesId)
                    : allVideos;
                    
                filteredVideos = searchVideos.filter(v => 
                    v.title.toLowerCase().includes(query.toLowerCase()) ||
                    (v.description && v.description.toLowerCase().includes(query.toLowerCase()))
                );
            }
            
            if (currentSeriesId) {
                filteredVideos = applyDefaultSortForSeriesVideos(filteredVideos);
                renderVideos();
            } else {
                renderStandaloneVideos();
            }
        }

        // Süre formatla
        function formatDuration(seconds) {
            if (!seconds) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Session ID
        function getSessionId() {
            let sessionId = localStorage.getItem('academy_session_id');
            if (!sessionId) {
                sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('academy_session_id', sessionId);
            }
            return sessionId;
        }

        // ESC ile kapat
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeVideoModal();
            if (e.key === 'ArrowRight') playNextVideo();
            if (e.key === 'ArrowLeft') playPreviousVideo();
        });
    </script>
</body>
</html>
