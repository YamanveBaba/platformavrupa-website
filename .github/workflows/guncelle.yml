name: Belcika Is Ilanlari Guncelle

on:
  schedule:
    - cron: '0 4 * * 1-6'   # Pazartesi-Cumartesi 04:00 UTC (06:00 Bruksel)
    - cron: '0 2 * * 0'      # Pazar 02:00 UTC — haftalik tam cekum
  workflow_dispatch:

jobs:
  guncelle:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ilan_cekici/requirements.txt

      - name: Bagimliliklar yukle
        run: pip install -r ilan_cekici/requirements.txt

      - name: Playwright chromium yukle
        run: python -m playwright install chromium --with-deps

      - name: Rastgele baslangic gecikmesi (0-25 dk)
        run: |
          DELAY=$((RANDOM % 1500))
          echo "Baslangic gecikmesi: ${DELAY} saniye"
          sleep $DELAY

      - name: FOREM cek (Valoniya)
        run: python -X utf8 ilan_cekici/forem_cek.py --temizle

      - name: Actiris cek (Bruksel)
        run: python -X utf8 ilan_cekici/actiris_cek.py --temizle

      - name: VDAB gunluk cek (Pazartesi-Cumartesi)
        if: github.event.schedule == '0 4 * * 1-6' || github.event_name == 'workflow_dispatch'
        run: python -X utf8 ilan_cekici/vdab_cek.py --gunler 1 --max 5000 --temizle

      - name: VDAB haftalik tam cek (Pazar)
        if: github.event.schedule == '0 2 * * 0'
        run: python -X utf8 ilan_cekici/vdab_cek.py --max 300000 --temizle

      - name: Haber cek (Avrupa Turkleri)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -X utf8 ilan_cekici/haber_cek.py

      - name: Ilanlari Turkceleştir (basliklar)
        run: python -X utf8 ilan_cekici/cevir.py --mode title --limit 15000

      - name: Ilanlari Turkceleştir (aciklamalar)
        run: python -X utf8 ilan_cekici/cevir.py --mode desc --limit 5000

      - name: Market urunlerini Turkceleştir
        run: python -X utf8 ilan_cekici/cevir.py --tablo market --limit 2000

      - name: Market urunlerini kategorile
        if: github.event.schedule == '0 2 * * 0' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python -X utf8 ilan_cekici/market_kategorile.py

      - name: Marketler arasi urun eslestir
        if: github.event.schedule == '0 2 * * 0' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python -X utf8 market_fiyat_cekici/urun_eslestir.py

      - name: Telegram bildirimi gonder
        if: always()
        run: python -X utf8 ilan_cekici/bildir.py
