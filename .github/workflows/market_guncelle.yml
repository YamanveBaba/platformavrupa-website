name: Market Fiyatları Güncelle

on:
  schedule:
    - cron: '0 1 * * 0'   # Her Pazar 01:00 UTC (03:00 Brüksel)
  workflow_dispatch:       # Manuel tetikleme

jobs:
  market:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 saat (market çekimi uzun sürebilir)

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISPLAY: ':99'

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: market_fiyat_cekici/requirements.txt

      - name: Bağımlılıkları yükle
        run: pip install -r market_fiyat_cekici/requirements.txt

      - name: Playwright + Camoufox kur
        run: |
          pip install playwright camoufox
          python -m playwright install chromium firefox --with-deps

      - name: Sanal ekran başlat (headless için)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2

      - name: Supabase projesi uyandır
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}")
          echo "Proje durumu: $STATUS"

      - name: Tüm marketleri çek
        run: python -X utf8 market_fiyat_cekici/be_tum_zincirler_cek.py
        continue-on-error: true

      - name: Ürünleri kategorile
        run: python -X utf8 ilan_cekici/market_kategorile.py
        continue-on-error: true

      - name: Marketler arası ürün eşleştir
        run: python -X utf8 market_fiyat_cekici/urun_eslestir.py
        continue-on-error: true

      - name: Market ürünlerini Türkçeleştir
        run: python -X utf8 ilan_cekici/cevir.py --tablo market --limit 2000
        continue-on-error: true

      - name: Telegram bildirimi gönder
        if: always()
        run: python -X utf8 ilan_cekici/bildir.py
