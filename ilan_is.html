    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Modern Select & Input */
        .modern-input, .modern-select, .modern-textarea {
            width: 100%; background-color: #ffffff; border: 1px solid #e2e8f0; 
            border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #334155; 
            outline: none; transition: all 0.2s;
        }
        .modern-input:focus, .modern-select:focus, .modern-textarea:focus {
            border-color: #9333ea; box-shadow: 0 0 0 4px rgba(147, 51, 234, 0.1);
        }
        
        /* Seçim Butonları */
        .rol-btn { 
            border: 2px solid #e2e8f0; background-color: white; color: #64748b; 
            cursor: pointer; transition: all 0.2s; border-radius: 16px;
        }
        .rol-btn:hover { border-color: #d8b4fe; background-color: #faf5ff; }
        .rol-btn.active { 
            background-color: #faf5ff; border-color: #9333ea; color: #7e22ce; 
            box-shadow: 0 4px 10px -2px rgba(147, 51, 234, 0.2); 
        }
    </style>

<body class="text-slate-800 flex flex-col min-h-screen">
    
    <nav class="bg-white/90 backdrop-blur border-b border-slate-200 sticky top-0 z-50 px-4 py-4 shadow-sm">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="ilan_giris.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 hover:bg-slate-100 text-slate-600 transition">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <span class="font-extrabold text-lg text-slate-800 tracking-tight">İŞ İLANI OLUŞTUR</span>
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-8 w-full">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200">
            <form onsubmit="ilanGonder(event)" id="isIlanFormu" class="space-y-6" novalidate>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="turSec('isveren', this)" class="rol-btn active p-5 text-center flex flex-col items-center justify-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 text-xl"><i class="fa-solid fa-briefcase"></i></div>
                        <span class="font-bold text-sm">Eleman Arıyorum</span>
                    </div>
                    <div onclick="turSec('isci', this)" class="rol-btn p-5 text-center flex flex-col items-center justify-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xl"><i class="fa-solid fa-user-tie"></i></div>
                        <span class="font-bold text-sm">İş Arıyorum</span>
                    </div>
                </div>
                <input type="hidden" id="ilanTuru" value="isveren">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Ülke</label>
                        <select id="ulkeSelect" onchange="ulkeDegisti()" class="modern-select">
                            <option value="">Ülke Seçiniz...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Şehir</label>
                        <select id="sehirSelect" disabled class="modern-select opacity-60 cursor-not-allowed">
                            <option value="">Önce Ülke Seçin</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Sektör</label>
                        <select id="sektor" class="modern-select">
                            <option value="">Sektör Seçiniz...</option>
                            <option value="Restoran">Restoran / Mutfak</option>
                            <option value="İnşaat">İnşaat / Tadilat</option>
                            <option value="Lojistik">Lojistik / Şoför</option>
                            <option value="Temizlik">Temizlik</option>
                            <option value="Sağlık">Sağlık / Bakım</option>
                            <option value="Satış">Satış / Market</option>
                            <option value="Bilişim">Bilişim / Yazılım</option>
                            <option value="Güvenlik">Güvenlik</option>
                            <option value="Ofis">Ofis / Yönetim</option>
                            <option value="Eğitim">Eğitim</option>
                            <option value="Serbest">Serbest Meslek</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Çalışma Şekli</label>
                        <select id="pozisyon" class="modern-select">
                            <option value="">Çalışma Şekli Seçiniz...</option>
                            <option value="Tam Zamanlı">Tam Zamanlı</option>
                            <option value="Yarı Zamanlı">Yarı Zamanlı</option>
                            <option value="Haftasonu">Haftasonu</option>
                            <option value="Proje Bazlı">Proje Bazlı</option>
                            <option value="Freelance">Freelance</option>
                            <option value="Staj">Staj</option>
                            <option value="Geçici">Geçici</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">İlan Başlığı</label>
                        <input type="text" id="baslik" placeholder="Örn: Tecrübeli Döner Ustası Aranıyor" class="modern-input" required>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Maaş (Opsiyonel)</label>
                        <input type="text" id="maas" placeholder="Örn: 2500€" class="modern-input">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Telefon Numarası</label>
                    <div class="flex gap-2">
                        <select id="telKod" class="modern-select w-1/3 text-center">
                            <option value="">Kod</option>
                        </select>
                        <input type="tel" id="telNo" placeholder="555 123 45 67" class="modern-input w-2/3">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">İlan Açıklaması</label>
                    <textarea id="aciklama" rows="5" placeholder="İş tanımı, aranan nitelikler ve diğer detaylar..." class="modern-textarea resize-none" required></textarea>
                </div>

                <div class="pt-6">
                    <button type="submit" id="gonderButton" class="bg-purple-600 text-white font-bold py-4 rounded-2xl text-lg shadow-lg shadow-purple-200 hover:bg-purple-700 transition w-full active:scale-95 flex items-center justify-center gap-3">
                        <span>İlanı Yayınla</span> <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="genel_veriler.js"></script>
    <script>
        // sb config.js tarafından tanımlandı

        // --- 2. SAYFA YÜKLENİNCE ---
        window.onload = function() {
            // Genel Verilerden Ülkeleri Doldur
            if (typeof ulkeleriDoldur === 'function') {
                ulkeleriDoldur('ulkeSelect');
                
                // Telefon Kodları
                const telSelect = document.getElementById('telKod');
                if(typeof lokasyonVeritabani !== 'undefined') {
                    telSelect.innerHTML = '<option value="">Kod</option>';
                    Object.keys(lokasyonVeritabani).forEach(kod => {
                        const ulke = lokasyonVeritabani[kod];
                        if (ulke.tel) {
                            const opt = document.createElement('option');
                            opt.value = ulke.tel;
                            opt.text = `${ulke.bayrak} ${ulke.tel}`;
                            if(kod === 'DE') opt.selected = true; // Varsayılan Almanya
                            telSelect.add(opt);
                        }
                    });
                }
            }
        };

        // --- 3. FONKSİYONLAR ---
        function ulkeDegisti() {
            const ulkeKod = document.getElementById('ulkeSelect').value;
            // Genel verilerden şehirleri getir
            if (typeof sehirleriGetirOrtak === 'function') {
                sehirleriGetirOrtak(ulkeKod, 'sehirSelect');
                const sehirBox = document.getElementById('sehirSelect');
                sehirBox.disabled = false;
                sehirBox.classList.remove('opacity-60', 'cursor-not-allowed');
            }
            // Telefon kodunu otomatik güncelle
            if (typeof lokasyonVeritabani !== 'undefined' && lokasyonVeritabani[ulkeKod]) {
                const telSelect = document.getElementById('telKod');
                if(telSelect) telSelect.value = lokasyonVeritabani[ulkeKod].tel;
            }
        }

        function turSec(tur, btn) {
            document.querySelectorAll('.rol-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('ilanTuru').value = tur;
        }

        async function ilanGonder(e) {
            e.preventDefault();

            // ZORUNLU ALAN KONTROLÜ
            const gerekli = [
                {id: 'ulkeSelect', msg: 'Lütfen Ülke seçiniz.'},
                {id: 'sehirSelect', msg: 'Lütfen Şehir seçiniz.'},
                {id: 'telKod', msg: 'Lütfen Telefon Kodu seçiniz.'},
                {id: 'telNo', msg: 'Lütfen Telefon Numarası giriniz.'},
                {id: 'sektor', msg: 'Lütfen Sektör seçiniz.'},
                {id: 'pozisyon', msg: 'Lütfen Çalışma Şekli seçiniz.'},
                {id: 'baslik', msg: 'Lütfen Başlık giriniz.'},
                {id: 'aciklama', msg: 'Lütfen Açıklama giriniz.'}
            ];

            for (let item of gerekli) {
                const el = document.getElementById(item.id);
                if(!el || !el.value.trim()) {
                    alert(item.msg);
                    if(el) el.focus();
                    return;
                }
            }

            const btn = document.getElementById('gonderButton');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Yayınlanıyor...';
            btn.disabled = true;

            // Verileri Topla
            const ulkeSelect = document.getElementById('ulkeSelect');
            const ulkeAdi = ulkeSelect.options[ulkeSelect.selectedIndex].text;
            const sehirAdi = document.getElementById('sehirSelect').value;
            const tamTelefon = document.getElementById('telKod').value + " " + document.getElementById('telNo').value;
            
            // --- KOORDİNAT BULMA ---
            let lat = 48.8566; // Varsayılan
            let lon = 2.3522;

            try {
                const query = `${sehirAdi}, ${ulkeSelect.value}`;
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if(data && data.length > 0) {
                    lat = parseFloat(data[0].lat);
                    lon = parseFloat(data[0].lon);
                }
            } catch (err) {}

            const yeniIlan = {
                id: Date.now(),
                baslik: document.getElementById('baslik').value,
                kategori: 'is', // Vitrinle uyumlu
                role: document.getElementById('ilanTuru').value, // isveren / isci
                
                // Filtreleme Anahtarları (VİTRİNLE UYUMLU)
                konum: sehirAdi,
                sehir: sehirAdi,
                ulke: ulkeSelect.value, // Kod olarak (örn: DE)
                sektor: document.getElementById('sektor').value, 
                pozisyon: document.getElementById('pozisyon').value,
                
                fiyat: document.getElementById('maas').value || "Belirtilmedi",
                aciklama: document.getElementById('aciklama').value,
                telefon: tamTelefon,
                lat: lat,
                lon: lon,
                created_at: new Date().toISOString()
            };

            // Supabase Kayıt
            try {
                if (sb && typeof sb.from === 'function') {
                    await sb.from('ilanlar').insert([yeniIlan]);
                }
            } catch (err) { console.log(err); }

            // LocalStorage Yedek
            const localData = JSON.parse(localStorage.getItem('posted_ads_is') || '[]');
            localData.unshift(yeniIlan);
            localStorage.setItem('posted_ads_is', JSON.stringify(localData));

            setTimeout(() => {
                alert("✅ İlanınız başarıyla yayınlandı!");
                window.location.href = 'is_vitrini.html';
            }, 1000);
        }
    </script>
</body>
</html>
