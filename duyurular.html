<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyurular ve Haberler | PlatformAvrupa</title>
    <meta name="description" content="Platform Avrupa duyuruları ve haberler. Gurbetçilere yönelik güncel duyurular, etkinlikler ve bilgilendirmeler.">
    <link rel="canonical" href="https://www.platformavrupa.com/duyurular.html">
    <meta property="og:title" content="Duyurular ve Haberler | PlatformAvrupa">
    <meta property="og:description" content="Platform Avrupa duyuruları ve haberler. Gurbetçilere yönelik güncel duyurular ve etkinlikler.">
    <meta property="og:url" content="https://www.platformavrupa.com/duyurular.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Platform Avrupa">
    <meta property="og:image" content="https://www.platformavrupa.com/og-image.png">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Duyurular ve Haberler | PlatformAvrupa">
    <meta name="twitter:description" content="Platform Avrupa duyuruları ve haberler. Gurbetçilere yönelik güncel duyurular.">
    <meta name="twitter:image" content="https://www.platformavrupa.com/og-image.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="utils.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .news-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; overflow: hidden;
            transition: all 0.3s ease; cursor: pointer;
        }
        .news-card:hover {
            transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: #cbd5e1;
        }
        .filter-btn {
            padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
            border: 1.5px solid #e2e8f0; background: white; cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: #1e293b; color: white; border-color: #1e293b;
        }
        .filter-btn:hover:not(.active) { background: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

    <nav class="bg-white/95 backdrop-blur sticky top-0 z-50 border-b border-slate-200 px-6 py-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-slate-600 hover:text-slate-900 transition font-bold">
                <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></div>
                <span>Ana Sayfa</span>
            </a>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Duyuru ve Haberler</h1>
            </div>
            <div class="w-24"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto px-4 py-8 w-full">

        <!-- Kategori Filtreleri -->
        <div class="flex gap-2 flex-wrap mb-6 pb-4 border-b border-slate-200">
            <button class="filter-btn active" onclick="setKategori('')">Tümü</button>
            <button class="filter-btn" onclick="setKategori('vize_ikamet')"><i class="fa-solid fa-id-card mr-1"></i>Vize & İkamet</button>
            <button class="filter-btn" onclick="setKategori('vatandaslik')"><i class="fa-solid fa-passport mr-1"></i>Vatandaşlık</button>
            <button class="filter-btn" onclick="setKategori('egitim_burs')"><i class="fa-solid fa-graduation-cap mr-1"></i>Eğitim & Burs</button>
            <button class="filter-btn" onclick="setKategori('is_ekonomi')"><i class="fa-solid fa-briefcase mr-1"></i>İş & Ekonomi</button>
            <button class="filter-btn" onclick="setKategori('kultur_toplum')"><i class="fa-solid fa-heart mr-1"></i>Kültür & Toplum</button>
            <button class="filter-btn" onclick="setKategori('turkiye')"><i class="fa-solid fa-flag mr-1"></i>Türkiye</button>
            <button class="filter-btn" onclick="setKategori('avrupa_politika')"><i class="fa-solid fa-landmark mr-1"></i>Avrupa Politika</button>
        </div>

        <!-- Ülke Filtreleri -->
        <div class="flex gap-2 flex-wrap mb-8">
            <button class="filter-btn active" id="ulke-btn-" onclick="setUlke('')">🌍 Tümü</button>
            <button class="filter-btn" id="ulke-btn-DE" onclick="setUlke('DE')">🇩🇪 Almanya</button>
            <button class="filter-btn" id="ulke-btn-NL" onclick="setUlke('NL')">🇳🇱 Hollanda</button>
            <button class="filter-btn" id="ulke-btn-BE" onclick="setUlke('BE')">🇧🇪 Belçika</button>
            <button class="filter-btn" id="ulke-btn-FR" onclick="setUlke('FR')">🇫🇷 Fransa</button>
        </div>

        <div id="haberListesi" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <p class="col-span-2 text-center text-slate-500 mt-10"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Yükleniyor...</p>
        </div>

        <div id="dahaFazlaWrap" class="text-center mt-10" style="display:none">
            <button id="dahaFazlaBtn" onclick="dahaFazlaYukle()" class="bg-slate-900 hover:bg-slate-700 text-white font-bold px-8 py-3 rounded-full transition shadow">
                Daha Fazla Yükle
            </button>
        </div>

    </main>

    <div class="bg-white border-t border-slate-200 mt-auto py-8 text-center text-xs text-slate-400">
        &copy; 2025 PlatformAvrupa. Tüm hakları saklıdır.
    </div>

    <script>
        const SUPABASE_URL = 'https://vhietrqljahdmloazgpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoaWV0cnFsamFoZG1sb2F6Z3BwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNTk5MTcsImV4cCI6MjA4MDYzNTkxN30.sxpUrTnR40XuEBPUeQXj352xMziGr_lDqdA8H69ejBA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const PAGE_SIZE = 20;
        let offset = 0;
        let aktifKategori = '';
        let aktifUlke = '';
        let toplamSayisi = 0;

        function setKategori(k) {
            aktifKategori = k;
            document.querySelectorAll('.filter-btn').forEach(b => {
                const fn = b.getAttribute('onclick') || '';
                if (fn.includes("setKategori('")) {
                    b.classList.toggle('active', fn.includes(`'${k}'`));
                }
            });
            veriCek();
        }

        function setUlke(u) {
            aktifUlke = u;
            document.querySelectorAll('[id^="ulke-btn-"]').forEach(b => b.classList.remove('active'));
            const el = document.getElementById('ulke-btn-' + u);
            if (el) el.classList.add('active');
            veriCek();
        }

        function veriCek() {
            offset = 0;
            document.getElementById('haberListesi').innerHTML =
                '<p class="col-span-2 text-center text-slate-500 mt-10"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Yükleniyor...</p>';
            document.getElementById('dahaFazlaWrap').style.display = 'none';
            yukle(true);
        }

        async function yukle(temizle) {
            let q = sb.from('announcements')
                .select('*', { count: 'exact' })
                .eq('status', 'published')
                .order('created_at', { ascending: false })
                .range(offset, offset + PAGE_SIZE - 1);

            if (aktifKategori) q = q.eq('kategori', aktifKategori);
            if (aktifUlke)     q = q.eq('country_code', aktifUlke);

            const { data, error, count } = await q;
            toplamSayisi = count || 0;

            const liste = document.getElementById('haberListesi');

            if (error) {
                liste.innerHTML = '<p class="text-red-500 text-center col-span-2">Hata oluştu.</p>';
                return;
            }

            if (temizle) liste.innerHTML = '';

            if (!data || data.length === 0) {
                if (temizle) liste.innerHTML = '<p class="text-slate-500 text-center col-span-2">Bu filtrede duyuru yok.</p>';
                document.getElementById('dahaFazlaWrap').style.display = 'none';
                return;
            }

            data.forEach(haber => {
                const tarih = formatDate ? formatDate(haber.created_at, 'long') : new Date(haber.created_at).toLocaleDateString('tr');
                const resim = haber.image_url ? haber.image_url : 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=600';

                const kategoriRenk = {
                    vize_ikamet: 'bg-blue-100 text-blue-700',
                    vatandaslik: 'bg-purple-100 text-purple-700',
                    egitim_burs: 'bg-green-100 text-green-700',
                    is_ekonomi: 'bg-amber-100 text-amber-700',
                    kultur_toplum: 'bg-rose-100 text-rose-700',
                    turkiye: 'bg-red-100 text-red-700',
                    avrupa_politika: 'bg-indigo-100 text-indigo-700',
                };
                const etiketClass = kategoriRenk[haber.kategori] || 'bg-slate-100 text-slate-600';
                const etiketMetin = (haber.kategori || 'GENEL').replace(/_/g,' ').toUpperCase();

                const html = `
                <div class="news-card group" onclick="window.location.href='duyuru_detay.html?id=${haber.id}'">
                    <div class="h-56 overflow-hidden relative">
                        <img src="${resim}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-60"></div>
                        <span class="absolute top-4 left-4 ${etiketClass} text-[10px] font-bold px-2 py-1 rounded shadow-sm uppercase tracking-wide">${etiketMetin}</span>
                        ${haber.ai_skor >= 8 ? '<span class="absolute top-4 right-4 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">ÖNEMLI</span>' : ''}
                    </div>
                    <div class="p-6">
                        <div class="text-xs text-slate-400 font-bold mb-2 flex items-center gap-1"><i class="fa-regular fa-clock"></i> ${tarih}</div>
                        <h2 class="text-xl font-bold text-slate-800 mb-3 leading-tight group-hover:text-blue-600 transition">${haber.title}</h2>
                        <p class="text-slate-500 text-sm leading-relaxed line-clamp-3">${haber.content || ''}</p>
                        <div class="mt-4 pt-4 border-t border-slate-50 flex items-center text-blue-600 text-sm font-bold gap-2 group-hover:gap-3 transition-all">
                            Haberi Oku <i class="fa-solid fa-arrow-right"></i>
                        </div>
                    </div>
                </div>`;
                liste.innerHTML += html;
            });

            offset += data.length;
            const kalan = toplamSayisi - offset;
            const wrap = document.getElementById('dahaFazlaWrap');
            const btn  = document.getElementById('dahaFazlaBtn');
            if (kalan > 0) {
                btn.textContent = `Daha Fazla Yükle (${kalan} kaldı)`;
                wrap.style.display = 'block';
            } else {
                wrap.style.display = 'none';
            }
        }

        async function dahaFazlaYukle() {
            document.getElementById('dahaFazlaBtn').textContent = 'Yükleniyor...';
            await yukle(false);
        }

        window.onload = () => veriCek();
    </script>

</body>
</html>
