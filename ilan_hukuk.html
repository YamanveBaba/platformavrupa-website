<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hukuk Başvuru Formu | PlatformAvrupa</title>
    <meta name="description" content="Hukuk ve danışmanlık başvuru formu. Avukat ile iletişime geçin.">
    <link rel="canonical" href="https://www.platformavrupa.com/ilan_hukuk.html">
    <meta property="og:title" content="Hukuk Başvuru Formu | PlatformAvrupa">
    <meta property="og:url" content="https://www.platformavrupa.com/ilan_hukuk.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Platform Avrupa">
    <meta property="og:image" content="https://www.platformavrupa.com/og-image.png">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Hukuk Başvuru Formu | PlatformAvrupa">
    <meta name="twitter:image" content="https://www.platformavrupa.com/og-image.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">
    
    <nav class="bg-white/90 backdrop-blur border-b border-slate-200 sticky top-0 z-50 px-4 py-4 shadow-sm">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="hukuk_vitrini.html" class="flex items-center gap-2 text-slate-600 hover:text-indigo-900 transition font-bold"><i class="fa-solid fa-arrow-left"></i> Geri Dön</a>
            <span class="font-extrabold text-lg text-indigo-900">BAŞVURU FORMU</span>
            <div class="w-20"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-10 w-full">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-slate-200">
            
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 border border-indigo-100">
                    <i class="fa-solid fa-file-signature"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Hukuki Destek Talep Edin</h1>
                <p class="text-slate-500 mt-2 text-sm">Aşağıdaki formu doldurun, uzmanlarımız dosyanızı incelesin.</p>
            </div>

            <form onsubmit="basvuruGonder(event)" id="hukukFormu" class="space-y-6">
                
                <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex items-center justify-between">
                    <div>
                        <p class="text-xs font-bold text-indigo-400 uppercase">Seçilen Konu</p>
                        <p id="gorunenKonu" class="text-lg font-bold text-indigo-900">Genel Hukuk</p>
                    </div>
                    <div class="text-indigo-300 text-xl"><i class="fa-solid fa-check-circle"></i></div>
                </div>
                
                <input type="hidden" id="konuInput" value="Genel Hukuk">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-sm font-bold text-slate-700 block mb-2">Adınız Soyadınız</label>
                        <input type="text" id="adsoyad" required class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 transition">
                    </div>
                    <div>
                        <label class="text-sm font-bold text-slate-700 block mb-2">Telefon (WhatsApp)</label>
                        <input type="tel" id="telefon" required placeholder="+32 ..." class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 transition">
                    </div>
                </div>

                <div>
                    <label class="text-sm font-bold text-slate-700 block mb-2">Detaylar</label>
                    <textarea id="detay" rows="6" required placeholder="Lütfen durumu kısaca özetleyin..." class="w-full border-2 border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 resize-none transition"></textarea>
                </div>

                <div class="bg-slate-50 border-2 border-dashed border-slate-300 rounded-xl p-6 text-center cursor-pointer hover:bg-indigo-50 hover:border-indigo-300 transition group relative">
                    <input type="file" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-400 group-hover:text-indigo-500 mb-2 transition"></i>
                    <p class="text-sm font-bold text-slate-600 group-hover:text-indigo-700 transition">Varsa Belge Yükleyin</p>
                    <p class="text-xs text-slate-400">(Mahkeme kararı, rapor, fotoğraf vb.)</p>
                </div>
                
                <div class="pt-4">
                    <button type="submit" id="gonderBtn" class="w-full bg-indigo-900 text-white font-bold py-4 rounded-xl text-lg hover:bg-indigo-800 transition shadow-lg flex items-center justify-center gap-2 transform active:scale-95">
                        <i class="fa-solid fa-paper-plane"></i> Başvuruyu Gönder
                    </button>
                    <p class="text-center text-xs text-slate-400 mt-4 flex items-center justify-center gap-1">
                        <i class="fa-solid fa-lock"></i> Bilgileriniz avukat gizliliği kapsamında korunmaktadır.
                    </p>
                </div>
            </form>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="genel_veriler.js"></script>

    <script>
        // Bu kod parçası diğer her şeyden bağımsız çalışır.
        // Sayfa açılır açılmaz URL'deki konuyu alıp kutuya yazar.
        (function() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const gelenKonu = urlParams.get('konu');
                
                if (gelenKonu) {
                    const temizKonu = decodeURIComponent(gelenKonu);
                    
                    // 1. Görünür yazıyı güncelle
                    const yaziAlani = document.getElementById('gorunenKonu');
                    if (yaziAlani) yaziAlani.innerText = temizKonu;
                    
                    // 2. Gizli inputu güncelle
                    const inputAlani = document.getElementById('konuInput');
                    if (inputAlani) inputAlani.value = temizKonu;
                }
            } catch (e) {
                console.error("Konu alma hatası:", e);
            }
        })();
    </script>

    <script>
        // sb config.js tarafından tanımlandı

        // Başvuru Gönderme Fonksiyonu
        async function basvuruGonder(e) {
            e.preventDefault();
            
            if (!supabase) {
                alert("Veritabanı bağlantısı kurulamadı. Lütfen sayfayı yenileyip tekrar deneyin.");
                return;
            }

            const btn = document.getElementById('gonderBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Gönderiliyor...';
            btn.disabled = true;

            const form = {
                konu: document.getElementById('konuInput').value,
                adsoyad: document.getElementById('adsoyad').value,
                telefon: document.getElementById('telefon').value,
                detay: document.getElementById('detay').value
            };

            const yeniBasvuru = {
                baslik: `Hukuk Başvurusu: ${form.konu} - ${form.adsoyad}`,
                aciklama: form.detay,
                kategori: 'HukukBasvuru', 
                altKategori: form.konu,
                konum: 'Online',
                fiyat: '0',
                detaylar: { telefon: form.telefon, adsoyad: form.adsoyad }
            };

            try {
                const { error } = await sb.from('ilanlar').insert([yeniBasvuru]);
                if (error) throw error;
                
                setTimeout(() => {
                    alert("✅ Başvurunuz başarıyla alındı! Uzmanımız inceleyip size en kısa sürede dönüş yapacaktır.");
                    document.getElementById('hukukFormu').reset();
                    window.location.href = 'hukuk_vitrini.html';
                }, 1000);

            } catch(err) {
                console.error(err);
                alert("Bir hata oluştu: " + err.message);
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Tekrar Dene';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
