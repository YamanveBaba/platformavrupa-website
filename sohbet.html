    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: white;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* Kaydırma Çubuğu */
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .chat-scroll::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }

        /* Mesaj Balonları */
        .msg-bubble { max-width: 85%; padding: 10px 12px; border-radius: 12px; font-size: 13px; margin-bottom: 8px; position: relative; word-wrap: break-word; }
        .msg-own { background-color: #4f46e5; color: white; border-bottom-right-radius: 2px; align-self: flex-end; }
        .msg-other { background-color: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px; align-self: flex-start; }
        
        /* Mobile Tab System */
        .mobile-tab-btn {
            flex: 1;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        .mobile-tab-btn.active-tab-genel {
            background: rgba(79, 70, 229, 0.2);
            border-bottom-color: #4f46e5;
            color: #818cf8;
        }
        .mobile-tab-btn.active-tab-sehir {
            background: rgba(16, 185, 129, 0.2);
            border-bottom-color: #10b981;
            color: #34d399;
        }
        
        /* Chat panel visibility on mobile */
        @media (max-width: 767px) {
            .chat-panel { display: none; }
            .chat-panel.active { display: flex; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="h-14 border-b border-white/10 flex items-center justify-between px-4 bg-[#0f172a] shrink-0">
        <div class="flex items-center gap-3">
            <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-white transition font-bold text-sm">
                <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Ana Sayfa</span>
            </a>
            <div class="h-5 w-px bg-white/10 hidden sm:block"></div>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-xs" id="myAvatar">?</div>
                <div class="hidden sm:block">
                    <p class="text-sm font-bold leading-none" id="myName">Yükleniyor...</p>
                    <p class="text-[10px] text-slate-400 leading-none mt-1" id="myCityDisplay">Konum Aranıyor...</p>
                </div>
            </div>
        </div>
    </nav>

    <!-- MOBİL TAB SİSTEMİ -->
    <div class="md:hidden flex border-b border-white/10 bg-[#0f172a]">
        <button onclick="switchMobileTab('genel')" id="tab-btn-genel" class="mobile-tab-btn active-tab-genel">
            <i class="fa-solid fa-earth-europe mr-2"></i>Genel
        </button>
        <button onclick="switchMobileTab('sehir')" id="tab-btn-sehir" class="mobile-tab-btn text-slate-400">
            <i class="fa-solid fa-location-dot mr-2"></i><span id="tabSehirLabel">Şehir</span>
        </button>
    </div>

    <!-- SOHBET PANELLERİ -->
    <div class="flex-1 p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 overflow-hidden">

        <!-- GENEL SOHBET -->
        <div id="panel-genel" class="chat-panel active flex flex-col bg-[#0f172a] rounded-2xl border border-white/10 shadow-2xl overflow-hidden">
            <div class="h-12 md:h-14 bg-indigo-900/20 border-b border-white/5 flex items-center justify-between px-4">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-earth-europe text-indigo-400"></i>
                    <h2 class="font-bold text-sm md:text-base">Genel Sohbet</h2>
                </div>
                <span class="text-[10px] bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded">Herkes</span>
            </div>
            
            <div id="box-genel" class="flex-1 overflow-y-auto p-4 flex flex-col chat-scroll">
                <p class="text-center text-slate-600 text-xs mt-10">Sohbet yükleniyor...</p>
            </div>

            <div class="p-3 bg-[#0b1120] border-t border-white/5">
                <form onsubmit="mesajGonder(event, 'genel', 'input-genel')" class="flex gap-2">
                    <input id="input-genel" type="text" placeholder="Genel sohbete yaz..." autocomplete="off" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white outline-none focus:border-indigo-500 transition">
                    <button class="w-10 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-white transition"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>
        </div>

        <!-- ŞEHİR SOHBETİ -->
        <div id="panel-sehir" class="chat-panel flex flex-col bg-[#0f172a] rounded-2xl border border-white/10 shadow-2xl overflow-hidden relative">
            <div class="h-12 md:h-14 bg-emerald-900/20 border-b border-white/5 flex items-center justify-between px-4">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-location-dot text-emerald-400"></i>
                    <h2 class="font-bold text-sm md:text-base" id="cityTitle">Şehir Sohbeti</h2>
                </div>
                <span class="text-[10px] bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded">Yerel</span>
            </div>

            <div id="box-sehir" class="flex-1 overflow-y-auto p-4 flex flex-col chat-scroll">
                <p class="text-center text-slate-600 text-xs mt-10">Sohbet yükleniyor...</p>
            </div>

            <div class="p-3 bg-[#0b1120] border-t border-white/5">
                <form onsubmit="mesajGonder(event, ben.sehir, 'input-sehir')" class="flex gap-2">
                    <input id="input-sehir" type="text" placeholder="Şehrine özel yaz..." autocomplete="off" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm text-white outline-none focus:border-emerald-500 transition">
                    <button class="w-10 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-white transition"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>

            <!-- Şehir Kilidi -->
            <div id="cityLock" class="absolute inset-0 bg-[#0f172a]/95 backdrop-blur-sm z-10 flex flex-col items-center justify-center text-center p-6 hidden">
                <i class="fa-solid fa-lock text-4xl text-slate-500 mb-3"></i>
                <h3 class="font-bold text-white">Erişim Kısıtlı</h3>
                <p class="text-sm text-slate-400 mb-4">Şehir sohbetini görmek için kayıt olup şehir seçmelisin.</p>
                <div class="flex gap-3">
                    <a href="login.html" class="bg-white text-black px-4 py-2 rounded-full font-bold text-xs hover:bg-slate-200 transition">Giriş Yap</a>
                    <a href="profil.html" class="bg-emerald-600 text-white px-4 py-2 rounded-full font-bold text-xs hover:bg-emerald-500 transition">Profili Düzenle</a>
                </div>
            </div>
        </div>

    </div>

    <script>
        let ben = { ad: 'Misafir', sehir: null };
        let currentMobileTab = 'genel';

        // Mobil Tab Değiştir
        function switchMobileTab(tab) {
            currentMobileTab = tab;
            
            // Tab butonları
            document.getElementById('tab-btn-genel').className = 'mobile-tab-btn ' + (tab === 'genel' ? 'active-tab-genel' : 'text-slate-400');
            document.getElementById('tab-btn-sehir').className = 'mobile-tab-btn ' + (tab === 'sehir' ? 'active-tab-sehir' : 'text-slate-400');
            
            // Paneller
            document.getElementById('panel-genel').classList.toggle('active', tab === 'genel');
            document.getElementById('panel-sehir').classList.toggle('active', tab === 'sehir');
        }

        window.onload = async function() {
            // 1. ÖNCE HAFIZADAN OKU
            const lsName = localStorage.getItem('userName');
            const lsCity = localStorage.getItem('userCity');

            if(lsName) ben.ad = lsName;
            
            if(lsCity && lsCity !== "null" && lsCity !== "") {
                ben.sehir = lsCity;
                sehirSohbetiniAc(lsCity);
            } else {
                document.getElementById('cityLock').classList.remove('hidden');
            }

            arayuzuGuncelle();
            mesajlariGetir('genel', 'box-genel');

            // 2. SONRA VERİTABANINDAN DOĞRULA
            const { data: { user } } = await sb.auth.getUser();

            if (user) {
                const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();

                if (profile) {
                    ben.ad = profile.full_name || profile.real_name || 'Kullanıcı';
                    if (profile.city) {
                        ben.sehir = profile.city;
                        localStorage.setItem('userCity', profile.city);
                        localStorage.setItem('userName', ben.ad);
                        sehirSohbetiniAc(profile.city);
                    }
                    arayuzuGuncelle();
                }
            }
            
            canliDinle();
        };

        function sehirSohbetiniAc(cityName) {
            document.getElementById('cityLock').classList.add('hidden');
            document.getElementById('cityTitle').innerText = cityName + " Sohbeti";
            document.getElementById('input-sehir').placeholder = cityName + " odasına yaz...";
            document.getElementById('myCityDisplay').innerText = cityName;
            document.getElementById('tabSehirLabel').innerText = cityName;
            mesajlariGetir(cityName, 'box-sehir');
        }

        function arayuzuGuncelle() {
            document.getElementById('myName').innerText = ben.ad;
            document.getElementById('myAvatar').innerText = ben.ad.substring(0,2).toUpperCase();
        }

        async function mesajlariGetir(odaId, divId) {
            const box = document.getElementById(divId);
            const { data } = await sb.from('messages').select('*').eq('room_id', odaId).order('created_at', { ascending: true }).limit(50);
            
            box.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(m => mesajEkle(m, divId));
                box.scrollTop = box.scrollHeight;
            } else {
                box.innerHTML = '<p class="text-center text-slate-600 text-xs mt-10">Henüz mesaj yok. İlk yazan sen ol!</p>';
            }
        }

        async function mesajGonder(e, odaId, inputId) {
            e.preventDefault();
            if (ben.ad === 'Misafir') { alert("Mesaj yazmak için giriş yapmalısınız!"); return; }
            
            const inp = document.getElementById(inputId);
            const txt = inp.value.trim();
            if (!txt) return;

            inp.value = '';
            await sb.from('messages').insert([{ room_id: odaId, user_name: ben.ad, content: txt }]);
        }

        function canliDinle() {
            sb.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const msg = payload.new;
                if (msg.room_id === 'genel') {
                    mesajEkle(msg, 'box-genel');
                    document.getElementById('box-genel').scrollTop = 99999;
                } else if (msg.room_id === ben.sehir) {
                    mesajEkle(msg, 'box-sehir');
                    document.getElementById('box-sehir').scrollTop = 99999;
                }
            }).subscribe();
        }

        function mesajEkle(msg, divId) {
            const box = document.getElementById(divId);
            if (box.innerHTML.includes('Henüz mesaj yok') || box.innerHTML.includes('Sohbet yükleniyor')) {
                box.innerHTML = '';
            }

            // XSS KORUMASI
            const safeContent = sanitize(msg.content);
            const safeName = sanitize(msg.user_name);
            const benMi = msg.user_name === ben.ad;
            const saat = new Date(msg.created_at).toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});

            let html = '';
            if (benMi) {
                html = `
                <div class="flex justify-end">
                    <div class="msg-bubble msg-own shadow-lg">
                        <p>${safeContent}</p>
                        <div class="text-[9px] text-white/60 text-right mt-1">${saat}</div>
                    </div>
                </div>`;
            } else {
                html = `
                <div class="flex justify-start">
                    <div class="msg-bubble msg-other shadow-md">
                        <span class="text-[10px] font-bold text-indigo-400 block mb-1">${safeName}</span>
                        <p class="text-slate-300">${safeContent}</p>
                        <div class="text-[9px] text-slate-500 mt-1">${saat}</div>
                    </div>
                </div>`;
            }
            box.insertAdjacentHTML('beforeend', html);
        }
    </script>
</body>
</html>
