<body class="flex items-center justify-center h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/40 via-[#020617] to-[#020617]">

    <div class="w-full max-w-md p-8 bg-white/5 border border-white/10 rounded-2xl backdrop-blur-xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Hoş Geldiniz</h1>
            <p class="text-slate-400 text-sm">PlatformAvrupa hesabınıza giriş yapın</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">E-POSTA</label>
                <input type="email" id="email" autocomplete="email" class="w-full bg-slate-900/50 border border-white/10 rounded-lg p-3 text-white outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">ŞİFRE</label>
                <input type="password" id="password" autocomplete="current-password" class="w-full bg-slate-900/50 border border-white/10 rounded-lg p-3 text-white outline-none focus:border-indigo-500 transition">
            </div>
            <button onclick="girisYap()" id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-indigo-500/20">
                Giriş Yap
            </button>
            
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                <div class="relative flex justify-center text-xs"><span class="px-2 bg-white/5 text-slate-400">veya</span></div>
            </div>
            
            <button onclick="googleIleGiris()" class="w-full bg-white text-slate-900 font-bold py-3 rounded-lg transition hover:bg-slate-100 flex items-center justify-center gap-3">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google ile Giriş Yap
            </button>
            <button onclick="facebookIleGiris()" class="w-full bg-[#1877F2] hover:bg-[#166FE5] text-white font-bold py-3 rounded-lg transition flex items-center justify-center gap-3">
                <i class="fa-brands fa-facebook-f text-lg"></i>
                Facebook ile Giriş Yap
            </button>
        </div>

        <p class="text-center text-xs text-slate-500 mt-6">
            Hesabın yok mu? <a href="kayit.html" class="text-indigo-400 hover:text-indigo-300 font-bold">Kayıt Ol</a>
        </p>
        
        <p class="text-center mt-2">
            <a href="sifre_unuttum.html" class="text-xs text-slate-500 hover:text-indigo-400">Şifremi Unuttum</a>
        </p>
        
        <p id="errorMsg" class="text-center text-red-400 text-xs mt-4 hidden"></p>
    </div>

    <script>
        async function girisYap() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            if(!email || !password) {
                err.innerText = "Lütfen tüm alanları doldurun.";
                err.classList.remove('hidden');
                return;
            }

            if (typeof isValidEmail === 'function' && !isValidEmail(email)) {
                err.innerText = "Geçerli bir e-posta adresi girin.";
                err.classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                err.innerText = "Şifre en az 6 karakter olmalıdır.";
                err.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Kontrol ediliyor...';
            btn.disabled = true;
            err.classList.add('hidden');

            // 1. Giriş İşlemi (merkezi auth.js üzerinden)
            const result = typeof signInWithEmail === 'function'
                ? await signInWithEmail(email, password)
                : { success: false, error: 'Giriş sistemi yüklenemedi.' };

            if (!result.success) {
                err.innerText = result.error || "Hatalı e-posta veya şifre.";
                err.classList.remove('hidden');
                btn.innerText = "Giriş Yap";
                btn.disabled = false;
                return;
            }

            // 2. Mevcut oturumu ve profili tazele (localStorage dahil)
            if (typeof initAuth === 'function') {
                await initAuth();
            }

            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Giriş Başarılı!';
            
            // Yönlendirme kontrolü
            const redirectUrl = localStorage.getItem('authRedirect');
            localStorage.removeItem('authRedirect');
            
            setTimeout(() => { 
                window.location.href = redirectUrl || 'index.html'; 
            }, 500);
        }
        
        // Google ile giriş
        async function googleIleGiris() {
            const err = document.getElementById('errorMsg');
            err.classList.add('hidden');
            const result = typeof signInWithGoogle === 'function'
                ? await signInWithGoogle()
                : { success: false, error: 'Google giriş sistemi yüklenemedi.' };

            if (!result.success) {
                console.error('Google giriş hatası:', result.error);
                err.innerText = 'Google ile giriş başarısız. Lütfen tekrar deneyin.';
                err.classList.remove('hidden');
            }
        }

        // Facebook ile giriş
        async function facebookIleGiris() {
            const err = document.getElementById('errorMsg');
            err.classList.add('hidden');
            const result = typeof signInWithFacebook === 'function'
                ? await signInWithFacebook()
                : { success: false, error: 'Facebook giriş sistemi yüklenemedi.' };

            if (!result.success) {
                console.error('Facebook giriş hatası:', result.error);
                err.innerText = 'Facebook ile giriş başarısız. Lütfen tekrar deneyin.';
                err.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
