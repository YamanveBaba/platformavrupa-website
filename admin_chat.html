<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sohbet Yönetimi | PlatformAvrupa</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scroll-thin::-webkit-scrollbar { width: 6px; }
        .scroll-thin::-webkit-scrollbar-track { background: #0f172a; }
        .scroll-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col" style="visibility:hidden">

    <nav class="h-20 border-b border-white/10 bg-[#0f172a] flex items-center justify-between px-8 fixed w-full z-50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-slate-400 hover:text-white transition"><i class="fa-solid fa-arrow-left"></i> Siteye Dön</a>
            <div class="h-6 w-px bg-white/10"></div>
            <h1 class="font-bold text-xl text-indigo-400"><i class="fa-solid fa-user-shield mr-2"></i>Sohbet Operasyon Merkezi</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden md:block">
                <p class="text-sm font-bold text-white">Süper Admin</p>
                <p class="text-xs text-green-400">● Çevrimiçi</p>
            </div>
            <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold">A</div>
        </div>
    </nav>

    <main class="flex-1 pt-24 px-6 pb-10 max-w-[1800px] mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">

        <div class="lg:col-span-1 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-5 rounded-2xl">
                    <p class="text-slate-400 text-xs uppercase font-bold">Toplam Mesaj</p>
                    <h3 class="text-3xl font-bold text-white mt-1" id="totalMsg">0</h3>
                </div>
                <div class="glass-panel p-5 rounded-2xl">
                    <p class="text-slate-400 text-xs uppercase font-bold">Aktif Oda</p>
                    <h3 class="text-3xl font-bold text-emerald-400 mt-1" id="activeRooms">0</h3>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="font-bold text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-chart-pie text-purple-400"></i> En Aktif Şehirler
                </h3>
                <div class="relative h-64">
                    <canvas id="cityChart"></canvas>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl h-[400px] flex flex-col">
                <h3 class="font-bold text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-list-ol text-blue-400"></i> Oda İstatistikleri
                </h3>
                <div class="overflow-y-auto scroll-thin flex-1 pr-2">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-500 border-b border-white/5">
                            <tr>
                                <th class="pb-2">Oda İsmi</th>
                                <th class="pb-2 text-right">Mesaj</th>
                                <th class="pb-2 text-right">Son 24s</th>
                            </tr>
                        </thead>
                        <tbody id="statsTableBody" class="text-slate-300">
                            <tr><td colspan="3" class="text-center py-4">Veriler yükleniyor...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1 flex flex-col h-[calc(100vh-140px)]">
            <div class="glass-panel rounded-2xl flex flex-col h-full overflow-hidden border-orange-500/30 border">
                <div class="p-4 bg-orange-900/20 border-b border-white/5 flex justify-between items-center">
                    <h3 class="font-bold text-orange-400"><i class="fa-solid fa-eye mr-2"></i>Canlı İzleme & Silme</h3>
                    <button onclick="loadStats()" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1 rounded transition"><i class="fa-solid fa-rotate"></i> Yenile</button>
                </div>
                <div id="monitorBox" class="flex-1 overflow-y-auto scroll-thin p-4 space-y-3">
                    <p class="text-center text-slate-500 text-sm mt-10">Mesajlar yükleniyor...</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="glass-panel p-6 rounded-2xl sticky top-24 border-indigo-500/30 border">
                <div class="mb-6 border-b border-white/10 pb-4">
                    <h3 class="font-bold text-indigo-400 text-lg"><i class="fa-solid fa-masks-theater mr-2"></i>Mesaj Gönder (Persona)</h3>
                    <p class="text-slate-400 text-xs mt-1">İstediğin isimle, istediğin odaya yaz.</p>
                </div>

                <form onsubmit="adminMesajGonder(event)" class="space-y-4">
                    
                    <div class="bg-indigo-900/20 p-4 rounded-xl border border-indigo-500/30">
                        <label class="text-xs font-bold text-indigo-300 mb-1 block uppercase">GÖRÜNEN İSİM (KİMLİK)</label>
                        <div class="flex gap-2">
                            <input type="text" id="fakeSenderName" value="Platform Yönetimi" class="flex-1 bg-slate-800 border border-slate-600 rounded-lg p-2 text-white focus:border-indigo-500 outline-none text-sm font-bold">
                            <button type="button" onclick="generateRandomName()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 rounded-lg text-xs font-bold whitespace-nowrap" title="Rastgele İsim"><i class="fa-solid fa-dice"></i></button>
                            <button type="button" onclick="setAdminName()" class="bg-red-600 hover:bg-red-500 text-white px-3 py-2 rounded-lg text-xs font-bold whitespace-nowrap" title="Yönetici Yap"><i class="fa-solid fa-user-shield"></i></button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">HEDEF ÜLKE (veya Genel)</label>
                        <select id="adminUlkeSelect" onchange="adminUlkeDegisti()" class="w-full bg-[#020617] border border-slate-700 text-white rounded-xl p-3 focus:border-indigo-500 outline-none transition cursor-pointer">
                            <option value="genel">🌍 Genel Sohbet (Tüm Kullanıcılar)</option>
                            </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">HEDEF ŞEHİR</label>
                        <select id="adminSehirSelect" disabled class="w-full bg-[#020617] border border-slate-700 text-slate-500 rounded-xl p-3 focus:border-indigo-500 outline-none transition cursor-not-allowed">
                            <option value="">Önce Ülke Seçiniz</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2">MESAJ İÇERİĞİ</label>
                        <textarea id="adminMsgInput" rows="3" placeholder="Mesajınızı buraya yazın..." class="w-full bg-[#020617] border border-slate-700 text-white rounded-xl p-3 focus:border-indigo-500 outline-none transition"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-900/20 transition flex items-center justify-center gap-2">
                        Gönder <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

    </main>

    <script src="genel_veriler.js"></script>

    <script>
        const SUPABASE_URL = 'https://vhietrqljahdmloazgpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoaWV0cnFsamFoZG1sb2F6Z3BwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNTk5MTcsImV4cCI6MjA4MDYzNTkxN30.sxpUrTnR40XuEBPUeQXj352xMziGr_lDqdA8H69ejBA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let cityChartInstance = null;

        // Rastgele İsim Havuzu
        const fakeNames = ["Ahmet Yılmaz", "Canan Dağ", "Mehmet Öztürk", "Elif Kaya", "Ali Vural", "Zeynep Demir", "Murat Boz", "Selin Şekerci", "Hakan Taşıyan", "Ayşe Çelik", "Gurbetçi34", "BerlinKartalı", "AvrupaFatihi"];

        function generateRandomName() {
            const rand = fakeNames[Math.floor(Math.random() * fakeNames.length)];
            document.getElementById('fakeSenderName').value = rand;
        }

        function setAdminName() {
            document.getElementById('fakeSenderName').value = "Platform Yönetimi";
        }

        // ── Admin Koruması ──────────────────────────────────────────
        const ACCESS_DENIED_HTML = `
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a">
                <div style="text-align:center;padding:2rem">
                    <i class="fa-solid fa-lock" style="font-size:4rem;color:#ef4444;margin-bottom:1rem;display:block"></i>
                    <h1 style="color:white;font-size:1.5rem;font-weight:700;margin-bottom:0.5rem">Erişim Engellendi</h1>
                    <p style="color:#94a3b8;margin-bottom:1.5rem">Bu sayfaya erişim yetkiniz yok.</p>
                    <a href="login.html" style="background:#4f46e5;color:white;padding:0.75rem 1.5rem;border-radius:0.5rem;font-weight:700;text-decoration:none">Giriş Yap</a>
                </div>
            </div>`;

        async function adminKontrol() {
            try {
                const { data: { user } } = await sb.auth.getUser();
                if (!user) { document.body.style.visibility = 'visible'; document.body.innerHTML = ACCESS_DENIED_HTML; return false; }
                const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single();
                if (profile?.role !== 'admin') { document.body.style.visibility = 'visible'; document.body.innerHTML = ACCESS_DENIED_HTML; return false; }
                document.body.style.visibility = 'visible';
                return true;
            } catch(e) {
                document.body.style.visibility = 'visible';
                document.body.innerHTML = ACCESS_DENIED_HTML;
                return false;
            }
        }

        window.onload = async function() {
            if (!(await adminKontrol())) return;

            monitorMesajlariGetir();
            loadStats();
            adminUlkeleriDoldur();

            sb.channel('admin-feed')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                if(payload.eventType === 'INSERT') {
                    renderMonitorMessage(payload.new);
                    setTimeout(loadStats, 2000); 
                } else if (payload.eventType === 'DELETE') {
                    const el = document.getElementById(`msg-${payload.old.id}`);
                    if(el) el.remove();
                    setTimeout(loadStats, 2000);
                }
            }).subscribe();
        };

        // --- ÜLKE/ŞEHİR SEÇİM MANTIĞI ---
        function adminUlkeleriDoldur() {
            const select = document.getElementById('adminUlkeSelect');
            if (typeof lokasyonVeritabani !== 'undefined') {
                const siraliKodlar = Object.keys(lokasyonVeritabani).sort((a, b) => 
                    lokasyonVeritabani[a].isim.localeCompare(lokasyonVeritabani[b].isim, 'tr')
                );
                siraliKodlar.forEach(kod => {
                    const ulke = lokasyonVeritabani[kod];
                    let opt = document.createElement('option');
                    opt.value = kod;
                    opt.text = `${ulke.bayrak} ${ulke.isim}`;
                    select.appendChild(opt);
                });
            }
        }

        function adminUlkeDegisti() {
            const ulkeKod = document.getElementById('adminUlkeSelect').value;
            const sehirSelect = document.getElementById('adminSehirSelect');
            sehirSelect.innerHTML = ''; 

            if (ulkeKod === 'genel') {
                sehirSelect.disabled = true;
                sehirSelect.classList.add('text-slate-500', 'cursor-not-allowed');
                sehirSelect.classList.remove('text-white');
                const opt = document.createElement('option'); opt.text = "Tüm Platform (Genel)"; sehirSelect.appendChild(opt);
            } else {
                sehirSelect.disabled = false;
                sehirSelect.classList.remove('text-slate-500', 'cursor-not-allowed');
                sehirSelect.classList.add('text-white');
                if (typeof lokasyonVeritabani !== 'undefined' && lokasyonVeritabani[ulkeKod]) {
                    const sehirler = lokasyonVeritabani[ulkeKod].sehirler.sort((a, b) => a.localeCompare(b, 'tr'));
                    sehirler.forEach(sehir => {
                        const opt = document.createElement('option'); opt.value = sehir; opt.text = sehir; sehirSelect.appendChild(opt);
                    });
                }
            }
        }

        // --- MANİPÜLE EDİLMİŞ MESAJ GÖNDERME ---
        async function adminMesajGonder(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const ulkeVal = document.getElementById('adminUlkeSelect').value;
            const content = document.getElementById('adminMsgInput').value.trim();
            const senderName = document.getElementById('fakeSenderName').value.trim() || "Anonim";
            
            let targetRoom = 'genel';
            if (ulkeVal !== 'genel') {
                targetRoom = document.getElementById('adminSehirSelect').value;
                if (!targetRoom) { alert("Lütfen bir şehir seçiniz!"); return; }
            }

            if(!content) { alert("Mesaj içeriği boş olamaz."); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Gönderiliyor...';

            // DİKKAT: user_name kısmına inputtan gelen değeri yazıyoruz!
            const { error } = await sb.from('messages').insert([
                { 
                    room_id: targetRoom, 
                    user_name: senderName, // *** BURASI ÖNEMLİ ***
                    content: content
                }
            ]);

            btn.disabled = false;
            btn.innerHTML = 'Gönder <i class="fa-solid fa-paper-plane"></i>';

            if(error) {
                alert('Hata: ' + error.message);
            } else {
                document.getElementById('adminMsgInput').value = '';
                // Buton efekti
                btn.classList.remove('bg-indigo-600');
                btn.classList.add('bg-green-600');
                setTimeout(() => {
                    btn.classList.add('bg-indigo-600');
                    btn.classList.remove('bg-green-600');
                }, 1000);
            }
        }

        // --- MONİTÖR VE SİLME ---
        async function monitorMesajlariGetir() {
            const box = document.getElementById('monitorBox');
            const { data, error } = await sb.from('messages').select('*').order('created_at', { ascending: false }).limit(100);
            if(error) return;
            box.innerHTML = '';
            if(data.length === 0) { box.innerHTML = '<p class="text-center text-slate-500">Hiç mesaj yok.</p>'; return; }
            data.forEach(msg => renderMonitorMessage(msg));
        }

        function renderMonitorMessage(msg) {
            const box = document.getElementById('monitorBox');
            const date = new Date(msg.created_at).toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            let roomBadgeColor = msg.room_id === 'genel' ? 'bg-indigo-500/20 text-indigo-300' : 'bg-emerald-500/20 text-emerald-300';
            let icon = msg.room_id === 'genel' ? '<i class="fa-solid fa-globe"></i>' : '<i class="fa-solid fa-location-dot"></i>';
            
            // Eğer "Platform Yönetimi" ise kırmızı, değilse beyaz
            let userClass = msg.user_name === 'Platform Yönetimi' ? "text-red-400 font-extrabold tracking-wide" : "text-white font-bold";

            const html = `
            <div id="msg-${msg.id}" class="bg-[#1e293b] p-3 rounded-lg border border-white/5 hover:border-white/20 transition group">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${roomBadgeColor} uppercase tracking-wider flex items-center gap-1">
                            ${icon} ${msg.room_id}
                        </span>
                        <span class="text-xs ${userClass}">${msg.user_name}</span>
                        <span class="text-[10px] text-slate-500">${date}</span>
                    </div>
                    <button onclick="mesajSil('${msg.id}')" class="text-slate-500 hover:text-red-500 transition px-2 bg-white/5 hover:bg-red-500/10 rounded ml-2 h-6 w-6 flex items-center justify-center" title="Kalıcı Olarak Sil">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                </div>
                <p class="text-sm text-slate-300 break-words">${msg.content}</p>
            </div>`;
            box.insertAdjacentHTML('afterbegin', html);
        }

        async function mesajSil(id) {
            if(confirm('Bu mesajı silmek istediğinize emin misiniz?')) {
                await sb.from('messages').delete().eq('id', id);
            }
        }

        // --- İSTATİSTİK ---
        async function loadStats() {
            const { data } = await sb.from('messages').select('room_id, created_at').limit(2000);
            if(!data) return;

            const stats = {};
            let total = data.length;
            const oneDayAgo = new Date(Date.now() - 86400000);

            data.forEach(m => {
                if(!stats[m.room_id]) stats[m.room_id] = { total: 0, last24h: 0 };
                stats[m.room_id].total++;
                if(new Date(m.created_at) > oneDayAgo) stats[m.room_id].last24h++;
            });

            const sortedRooms = Object.keys(stats).sort((a,b) => stats[b].total - stats[a].total);
            document.getElementById('totalMsg').innerText = total + '+';
            document.getElementById('activeRooms').innerText = sortedRooms.length;

            const tbody = document.getElementById('statsTableBody');
            tbody.innerHTML = sortedRooms.map(room => `
                <tr class="border-b border-white/5 hover:bg-white/5">
                    <td class="py-3 font-bold text-white pl-2">${room}</td>
                    <td class="py-3 text-right pr-2">${stats[room].total}</td>
                    <td class="py-3 text-right text-green-400 font-bold pr-2">+${stats[room].last24h}</td>
                </tr>`).join('');

            renderChart(sortedRooms, stats);
        }

        function renderChart(labels, statsData) {
            const ctx = document.getElementById('cityChart').getContext('2d');
            let finalLabels = labels.slice(0, 5);
            let finalData = finalLabels.map(l => statsData[l].total);
            if(labels.length > 5) { finalLabels.push('Diğer'); finalData.push(labels.slice(5).reduce((acc, curr) => acc + statsData[curr].total, 0)); }

            if(cityChartInstance) cityChartInstance.destroy();
            cityChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: finalLabels, datasets: [{ data: finalData, backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ec4899', '#3b82f6', '#64748b'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: 'white', font: {family:'Inter'} } } } }
            });
        }
    </script>
</body>
</html>
