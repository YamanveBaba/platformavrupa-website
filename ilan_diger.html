<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diğer İlan Ver | PlatformAvrupa</title>
    <meta name="description" content="Diğer kategorilerde ilan verin. Platform Avrupa ilan formu.">
    <link rel="canonical" href="https://www.platformavrupa.com/ilan_diger.html">
    <meta property="og:title" content="Diğer İlan Ver | PlatformAvrupa">
    <meta property="og:url" content="https://www.platformavrupa.com/ilan_diger.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Platform Avrupa">
    <meta property="og:image" content="https://www.platformavrupa.com/og-image.png">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Diğer İlan Ver | PlatformAvrupa">
    <meta name="twitter:image" content="https://www.platformavrupa.com/og-image.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Modern Input & Select */
        .modern-input, .modern-select, .modern-textarea {
            width: 100%; background-color: #ffffff; border: 1px solid #e2e8f0; 
            border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #334155; 
            outline: none; transition: all 0.2s;
        }
        .modern-input:focus, .modern-select:focus, .modern-textarea:focus {
            border-color: #64748b; box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.1);
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">
    
    <nav class="bg-white/90 backdrop-blur border-b border-slate-200 sticky top-0 z-50 px-4 py-4 shadow-sm">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="ilan_giris.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 hover:bg-slate-100 text-slate-600 transition">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <span class="font-extrabold text-lg text-slate-700 tracking-tight">DİĞER İLANLAR</span>
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-8 w-full">
        
        <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-6 flex items-start gap-3">
            <i class="fa-solid fa-circle-info text-blue-500 mt-1"></i>
            <p class="text-sm text-blue-800 leading-relaxed">
                <span class="font-bold">Hangi kategoriyi seçeceğinizden emin değil misiniz?</span><br>
                Eğer ilanınız Emlak, Vasıta, İş, Hizmet, Eşya veya Mutfak kategorilerine uymuyorsa, doğru yerdesiniz. Buradan genel amaçlı ilanlarınızı paylaşabilirsiniz.
            </p>
        </div>

        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200">
            <form onsubmit="ilanGonder(event)" id="digerIlanFormu" class="space-y-6" novalidate>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Ülke</label>
                        <select id="ulkeSelect" onchange="ulkeDegisti()" class="modern-select">
                            <option value="">Ülke Seçiniz...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Şehir</label>
                        <select id="sehirSelect" disabled class="modern-select opacity-60 cursor-not-allowed">
                            <option value="">Önce Ülke Seçin</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Telefon Numarası</label>
                    <div class="flex gap-2">
                        <select id="telKod" class="modern-select w-1/3 text-center px-1">
                            <option value="">Kod</option>
                        </select>
                        <input type="tel" id="telNo" placeholder="555 123 45 67" class="modern-input w-2/3">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">İlan Başlığı</label>
                    <input type="text" id="baslik" placeholder="Örn: Yol Arkadaşı Arıyorum / Kayıp Cüzdan" class="modern-input" required>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Görsel (İsteğe Bağlı)</label>
                    <label for="resimDosyasi" class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-200 border-dashed rounded-2xl cursor-pointer bg-slate-50 hover:bg-slate-100 hover:border-slate-300 transition group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl text-slate-400 group-hover:text-slate-600 mb-2 transition"></i>
                            <p class="mb-1 text-sm text-slate-500 group-hover:text-slate-700 font-medium" id="dosyaBilgisi">Fotoğraf Yükle</p>
                        </div>
                        <input id="resimDosyasi" type="file" class="hidden" accept="image/*" onchange="resimSecildi(this)" />
                    </label>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Açıklama</label>
                    <textarea id="aciklama" rows="6" placeholder="İlanınız hakkında detaylı bilgi verin..." class="modern-textarea resize-none"></textarea>
                </div>

                <div class="pt-6">
                    <button type="submit" id="gonderButton" class="bg-slate-700 text-white font-bold py-4 rounded-2xl text-lg shadow-lg shadow-slate-200 hover:bg-slate-800 transition w-full active:scale-95 flex items-center justify-center gap-3">
                        <span>İlanı Yayınla</span> <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="genel_veriler.js"></script>
    <script>
        // --- 1. GÜVENLİ SUPABASE ---
        let sb = null;
        if (typeof supabase !== 'undefined') sb = supabase;
        else if (typeof createClient !== 'undefined' && typeof SUPABASE_URL !== 'undefined') sb = createClient(SUPABASE_URL, SUPABASE_KEY);
        else if (typeof initSupabase === 'function') sb = initSupabase();

        let secilenResimBase64 = null;

        // --- 2. SAYFA YÜKLENİNCE ---
        window.onload = function() {
            if (typeof ulkeleriDoldur === 'function') {
                ulkeleriDoldur('ulkeSelect');
                telefonKodlariniDoldur('telKod');
            }
        };

        // --- 3. FONKSİYONLAR ---
        function telefonKodlariniDoldur(selectId) {
            const select = document.getElementById(selectId);
            if (!select || typeof lokasyonVeritabani === 'undefined') return;
            select.innerHTML = '<option value="">Kod</option>';
            Object.keys(lokasyonVeritabani).forEach(kod => {
                const ulke = lokasyonVeritabani[kod];
                if (ulke.tel) {
                    const opt = document.createElement('option');
                    opt.value = ulke.tel;
                    opt.text = `${ulke.bayrak} ${ulke.tel}`;
                    if(kod === 'DE') opt.selected = true;
                    select.add(opt);
                }
            });
        }

        function ulkeDegisti() {
            const ulkeKod = document.getElementById('ulkeSelect').value;
            if (typeof sehirleriGetirOrtak === 'function') {
                sehirleriGetirOrtak(ulkeKod, 'sehirSelect');
                const sehirBox = document.getElementById('sehirSelect');
                sehirBox.disabled = false;
                sehirBox.classList.remove('opacity-60', 'cursor-not-allowed');
            }
            if (ulkeKod && lokasyonVeritabani[ulkeKod]) {
                document.getElementById('telKod').value = lokasyonVeritabani[ulkeKod].tel;
            }
        }

        function resimSecildi(input) {
            if (input.files && input.files[0]) {
                const dosya = input.files[0];
                document.getElementById('dosyaBilgisi').innerText = "✅ " + dosya.name;
                document.getElementById('dosyaBilgisi').classList.add('text-green-600');
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    secilenResimBase64 = e.target.result;
                }
                reader.readAsDataURL(dosya);
            }
        }

        async function ilanGonder(e) {
            e.preventDefault();

            // ZORUNLU ALAN KONTROLÜ
            const gerekli = [
                {id: 'ulkeSelect', msg: 'Lütfen Ülke seçiniz.'},
                {id: 'sehirSelect', msg: 'Lütfen Şehir seçiniz.'},
                {id: 'telKod', msg: 'Lütfen Telefon Kodu seçiniz.'},
                {id: 'telNo', msg: 'Lütfen Telefon Numarası giriniz.'},
                {id: 'baslik', msg: 'Lütfen Başlık giriniz.'},
                {id: 'aciklama', msg: 'Lütfen Açıklama giriniz.'}
            ];

            for (let item of gerekli) {
                const el = document.getElementById(item.id);
                if(!el || !el.value.trim()) {
                    alert(item.msg);
                    if(el) el.focus();
                    return;
                }
            }

            const btn = document.getElementById('gonderButton');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Kaydediliyor...';
            btn.disabled = true;

            const ulkeSelect = document.getElementById('ulkeSelect');
            const sehirAdi = document.getElementById('sehirSelect').value;
            const tamTelefon = document.getElementById('telKod').value + " " + document.getElementById('telNo').value;

            // Konum Bulma
            let lat = 48.8566, lon = 2.3522;
            try {
                const query = `${sehirAdi}, ${ulkeSelect.value}`;
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if(data && data.length > 0) {
                    lat = parseFloat(data[0].lat);
                    lon = parseFloat(data[0].lon);
                }
            } catch (err) {}

            const yeniIlan = {
                id: Date.now(),
                baslik: document.getElementById('baslik').value,
                kategori: 'diger', // Vitrinle uyumlu
                
                // Kategorisiz olduğu için genel
                konum: sehirAdi,
                sehir: sehirAdi,
                ulke: ulkeSelect.value,
                
                fiyat: "Belirtilmedi",
                aciklama: document.getElementById('aciklama').value,
                telefon: tamTelefon,
                lat: lat, lon: lon,
                
                resim: secilenResimBase64 || null, 
                tarih: "Şimdi"
            };

            // Supabase & LocalStorage
            try {
                if (sb && typeof sb.from === 'function') await sb.from('ilanlar').insert([yeniIlan]);
            } catch (err) { console.error(err); }

            // ✅ BAŞARILI - Artık localStorage yok, sadece Supabase
            alert("✅ İlanınız başarıyla yayınlandı!");
            window.location.href = 'diger_vitrini.html';
        }
    </script>
</body>
</html>
