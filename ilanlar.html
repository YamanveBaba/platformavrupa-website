</head>
<body>

    <nav class="bg-[#020617] text-white sticky top-0 z-50 shadow-xl border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-20">
            <a href="index.html" class="flex items-center gap-2 font-extrabold text-2xl">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center"><i class="fa-solid fa-paper-plane text-sm"></i></div>
                Platform<span class="text-indigo-500">Avrupa</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-slate-400 hover:text-white text-sm font-bold">Ana Sayfa</a>
                <a href="sohbet.html" class="text-slate-400 hover:text-white text-sm font-bold">Sohbet</a>
            </div>
        </div>
    </nav>

    <div class="bg-indigo-900 py-12 px-6 text-center text-white relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-3xl font-bold mb-2">Avrupa Vitrini</h1>
            <p class="text-indigo-200">En güncel ilanlar ve fırsatlar.</p>
        </div>
        <div class="absolute top-0 left-0 w-64 h-64 bg-indigo-600 rounded-full blur-3xl opacity-20 -translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute bottom-0 right-0 w-64 h-64 bg-purple-600 rounded-full blur-3xl opacity-20 translate-x-1/2 translate-y-1/2"></div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12">

        <!-- Filtreler -->
        <div class="flex flex-wrap gap-3 mb-8 items-center">
            <select id="kategoriFiltre" onchange="ilanYukle()" class="border border-slate-200 rounded-xl px-4 py-2 text-sm font-medium bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="">Tüm Kategoriler</option>
                <option value="Is Ilani">İş İlanları</option>
                <option value="Emlak">Emlak</option>
                <option value="Vasita">Vasıta</option>
                <option value="Esya">Eşya</option>
                <option value="Hizmet">Hizmet</option>
                <option value="Yemek">Yemek</option>
                <option value="Hukuk">Hukuk</option>
                <option value="Diger">Diğer</option>
            </select>
            <select id="ulkeFiltre" onchange="ilanYukle()" class="border border-slate-200 rounded-xl px-4 py-2 text-sm font-medium bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="">Tüm Ülkeler</option>
                <option value="BE">Belçika</option>
                <option value="DE">Almanya</option>
                <option value="NL">Hollanda</option>
                <option value="FR">Fransa</option>
                <option value="AT">Avusturya</option>
                <option value="CH">İsviçre</option>
            </select>
            <span class="text-sm text-slate-400 ml-auto">67.000+ aktif ilan</span>
        </div>

        <div id="loading" class="text-center py-20">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-600"></i>
            <p class="text-slate-500 mt-4">İlanlar yükleniyor...</p>
        </div>

        <div id="ilanGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 hidden"></div>

        <div class="text-center mt-10">
            <button id="dahaFazlaBtn" onclick="sayfaArt()" class="hidden px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition">
                Daha Fazla Göster
            </button>
        </div>

    </main>

    <script>
        const SUPABASE_URL = 'https://vhietrqljahdmloazgpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoaWV0cnFsamFoZG1sb2F6Z3BwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNTk5MTcsImV4cCI6MjA4MDYzNTkxN30.sxpUrTnR40XuEBPUeQXj352xMziGr_lDqdA8H69ejBA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SAYFA_BOYUTU = 48;
        let mevcutSayfa = 0;
        let toplamIlan = 0;

        const KATEGORI_RENK = {
            'Is Ilani': 'bg-blue-100 text-blue-700',
            'Emlak':    'bg-green-100 text-green-700',
            'Vasita':   'bg-orange-100 text-orange-700',
            'Esya':     'bg-purple-100 text-purple-700',
            'Hizmet':   'bg-pink-100 text-pink-700',
            'Yemek':    'bg-yellow-100 text-yellow-700',
            'Hukuk':    'bg-red-100 text-red-700',
        };

        function ilanKartHTML(ilan) {
            const renk = KATEGORI_RENK[ilan.category] || 'bg-slate-100 text-slate-600';
            const resim = ilan.image || 'https://via.placeholder.com/400x300/e2e8f0/94a3b8?text=' + encodeURIComponent(ilan.category || 'İlan');
            const sehir = [ilan.city, ilan.country].filter(Boolean).join(', ');
            return `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-xl transition group h-full flex flex-col">
                <div class="h-40 overflow-hidden relative bg-slate-100">
                    <img src="${resim}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='https://via.placeholder.com/400x300/e2e8f0/94a3b8?text=İlan'">
                    <div class="absolute top-3 left-3 ${renk} text-xs font-bold px-2 py-1 rounded-md shadow-sm">
                        ${ilan.category || 'Genel'}
                    </div>
                </div>
                <div class="p-4 flex-1 flex flex-col">
                    <h3 class="font-bold text-slate-900 line-clamp-2 text-sm mb-1">${ilan.title || 'İlan'}</h3>
                    ${ilan.owner_name ? `<p class="text-xs text-slate-400 mb-1 line-clamp-1"><i class="fa-solid fa-building mr-1"></i>${ilan.owner_name}</p>` : ''}
                    <p class="text-xs text-slate-500 flex items-center gap-1 mb-3">
                        <i class="fa-solid fa-location-dot text-indigo-400"></i> ${sehir || '—'}
                    </p>
                    ${ilan.price ? `<p class="text-indigo-600 font-bold text-sm mb-2">${ilan.price}</p>` : ''}
                    <a href="${ilan.source_url || ('ilan_detay.html?id=' + ilan.id)}" target="${ilan.source_url ? '_blank' : '_self'}"
                       class="mt-auto w-full py-2 border border-indigo-600 text-indigo-600 font-bold rounded-xl hover:bg-indigo-600 hover:text-white transition text-sm text-center block">
                        İncele
                    </a>
                </div>
            </div>`;
        }

        async function ilanYukle(ekle = false) {
            if (!ekle) {
                mevcutSayfa = 0;
                document.getElementById('ilanGrid').innerHTML = '';
            }
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('ilanGrid').classList.add('hidden');
            document.getElementById('dahaFazlaBtn').classList.add('hidden');

            const kategori = document.getElementById('kategoriFiltre').value;
            const ulke = document.getElementById('ulkeFiltre').value;

            let sorgu = sb.from('ilanlar')
                .select('id,title,category,city,country,image,price,owner_name,source_url')
                .eq('status', 'active')
                .order('created_at', { ascending: false })
                .range(mevcutSayfa * SAYFA_BOYUTU, (mevcutSayfa + 1) * SAYFA_BOYUTU - 1);

            if (kategori) sorgu = sorgu.eq('category', kategori);
            if (ulke)    sorgu = sorgu.eq('country', ulke);

            const { data, error } = await sorgu;

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('ilanGrid').classList.remove('hidden');

            if (error || !data) {
                document.getElementById('ilanGrid').innerHTML = '<p class="text-center text-red-500 col-span-full">Yüklenirken hata oluştu: ' + (error?.message || '') + '</p>';
                return;
            }

            if (!ekle && data.length === 0) {
                document.getElementById('ilanGrid').innerHTML = '<p class="text-center text-slate-500 col-span-full py-16">Bu kategoride ilan bulunamadı.</p>';
                return;
            }

            data.forEach(ilan => {
                document.getElementById('ilanGrid').insertAdjacentHTML('beforeend', ilanKartHTML(ilan));
            });

            // Tam sayfa geldiyse daha fazla olabilir
            if (data.length === SAYFA_BOYUTU) {
                document.getElementById('dahaFazlaBtn').classList.remove('hidden');
            }
        }

        function sayfaArt() {
            mevcutSayfa++;
            ilanYukle(true);
        }

        window.onload = () => ilanYukle();
    </script>
</body>
</html>
