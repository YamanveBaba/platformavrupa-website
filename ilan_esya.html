<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eşya İlanı Ver | PlatformAvrupa</title>
    <meta name="description" content="Eşya ilanı verin. Alım satım ve ikinci el eşya ilanları.">
    <link rel="canonical" href="https://www.platformavrupa.com/ilan_esya.html">
    <meta property="og:title" content="Eşya İlanı Ver | PlatformAvrupa">
    <meta property="og:url" content="https://www.platformavrupa.com/ilan_esya.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Platform Avrupa">
    <meta property="og:image" content="https://www.platformavrupa.com/og-image.png">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Eşya İlanı Ver | PlatformAvrupa">
    <meta name="twitter:image" content="https://www.platformavrupa.com/og-image.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Modern Input & Select */
        .modern-input, .modern-select, .modern-textarea {
            width: 100%; background-color: #ffffff; border: 1px solid #e2e8f0; 
            border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 500; color: #334155; 
            outline: none; transition: all 0.2s;
        }
        .modern-input:focus, .modern-select:focus, .modern-textarea:focus {
            border-color: #d97706; box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.1);
        }
        
        /* Seçim Butonları (Amber Tema) */
        .rol-btn { 
            border: 2px solid #e2e8f0; background-color: white; color: #64748b; 
            cursor: pointer; transition: all 0.2s; border-radius: 16px;
        }
        .rol-btn:hover { border-color: #fcd34d; background-color: #fffbeb; }
        .rol-btn.active { 
            background-color: #fffbeb; border-color: #d97706; color: #b45309; 
            box-shadow: 0 4px 10px -2px rgba(217, 119, 6, 0.2); 
        }

        /* Fotoğraf Silme Butonu */
        .foto-sil-btn {
            position: absolute; top: -5px; right: -5px; 
            background: red; color: white; border-radius: 50%; 
            width: 20px; height: 20px; display: flex; 
            align-items: center; justify-content: center; 
            font-size: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">
    
    <nav class="bg-white/90 backdrop-blur border-b border-slate-200 sticky top-0 z-50 px-4 py-4 shadow-sm">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="ilan_giris.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 hover:bg-slate-100 text-slate-600 transition">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <span class="font-extrabold text-lg text-slate-800 tracking-tight">EŞYA İLANI OLUŞTUR</span>
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-8 w-full">
        <div class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200">
            <form onsubmit="ilanGonder(event)" id="esyaIlanFormu" class="space-y-6" novalidate>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="durumSec('İkinci El', this)" class="rol-btn active p-5 text-center flex flex-col items-center justify-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 text-xl"><i class="fa-solid fa-recycle"></i></div>
                        <span class="font-bold text-sm">İkinci El</span>
                    </div>
                    <div onclick="durumSec('Sıfır', this)" class="rol-btn p-5 text-center flex flex-col items-center justify-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 text-xl"><i class="fa-solid fa-box-open"></i></div>
                        <span class="font-bold text-sm">Sıfır (Kutulu)</span>
                    </div>
                </div>
                <input type="hidden" id="urunDurumu" value="İkinci El">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Ülke</label>
                        <select id="ulkeSelect" onchange="ulkeDegisti()" class="modern-select">
                            <option value="">Ülke Seçiniz...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Şehir</label>
                        <select id="sehirSelect" disabled class="modern-select opacity-60 cursor-not-allowed">
                            <option value="">Önce Ülke Seçin</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Kategori</label>
                        <select id="kategori" class="modern-select">
                            <option value="">Seçiniz...</option>
                            <option value="Mobilya">Mobilya & Dekorasyon</option>
                            <option value="Beyaz Eşya">Beyaz Eşya & Mutfak</option>
                            <option value="Elektronik">Elektronik & Telefon</option>
                            <option value="Giyim">Giyim & Moda</option>
                            <option value="Bebek">Anne & Bebek</option>
                            <option value="Spor">Spor & Outdoor</option>
                            <option value="Hobi">Hobi & Sanat</option>
                            <option value="Antika">Antika & Koleksiyon</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Fiyat (€)</label>
                        <input type="number" id="fiyat" placeholder="Örn: 150" class="modern-input font-bold text-amber-800">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">İlan Başlığı</label>
                        <input type="text" id="baslik" placeholder="Örn: IKEA L Koltuk, Gri Renk" class="modern-input" required>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Telefon Numarası</label>
                        <div class="flex gap-2">
                            <select id="telKod" class="modern-select w-1/3 text-center px-1">
                                <option value="">Kod</option>
                            </select>
                            <input type="tel" id="telNo" placeholder="555 123 45 67" class="modern-input w-2/3">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Ürün Görselleri (Maks 10)</label>
                    <label for="resimDosyasi" class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-200 border-dashed rounded-2xl cursor-pointer bg-slate-50 hover:bg-amber-50 hover:border-amber-300 transition group relative overflow-hidden">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <i class="fa-solid fa-camera text-2xl text-slate-400 group-hover:text-amber-500 mb-2 transition"></i>
                            <p class="mb-1 text-sm text-slate-500 group-hover:text-amber-600 font-medium" id="dosyaBilgisi">Fotoğrafları Seç (Max 10)</p>
                        </div>
                        <input id="resimDosyasi" type="file" class="hidden" accept="image/*" multiple onchange="resimSecildi(this)" />
                    </label>

                    <div id="onizlemeAlani" class="grid grid-cols-4 sm:grid-cols-5 gap-3 mt-4 hidden">
                        </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block ml-1">Açıklama</label>
                    <textarea id="aciklama" rows="4" placeholder="Ürünün durumu, kusurları, ölçüleri vb..." class="modern-textarea resize-none"></textarea>
                </div>

                <div class="pt-6">
                    <button type="submit" id="gonderButton" class="bg-amber-500 text-white font-bold py-4 rounded-2xl text-lg shadow-lg shadow-amber-200 hover:bg-amber-600 transition w-full active:scale-95 flex items-center justify-center gap-3">
                        <span>İlanı Yayınla</span> <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="genel_veriler.js"></script>
    <script>
        // sb config.js tarafından tanımlandı

        // ARTIK BİR DİZİ (ARRAY) TUTUYORUZ
        let secilenResimlerListesi = [];

        // --- 2. SAYFA YÜKLENİNCE ---
        window.onload = function() {
            if (typeof ulkeleriDoldur === 'function') {
                ulkeleriDoldur('ulkeSelect');
                telefonKodlariniDoldur('telKod');
            }
        };

        // --- 3. FONKSİYONLAR ---
        function telefonKodlariniDoldur(selectId) {
            const select = document.getElementById(selectId);
            if (!select || typeof lokasyonVeritabani === 'undefined') return;
            select.innerHTML = '<option value="">Kod</option>';
            Object.keys(lokasyonVeritabani).forEach(kod => {
                const ulke = lokasyonVeritabani[kod];
                if (ulke.tel) {
                    const opt = document.createElement('option');
                    opt.value = ulke.tel;
                    opt.text = `${ulke.bayrak} ${ulke.tel}`;
                    if(kod === 'DE') opt.selected = true;
                    select.add(opt);
                }
            });
        }

        function ulkeDegisti() {
            const ulkeKod = document.getElementById('ulkeSelect').value;
            if (typeof sehirleriGetirOrtak === 'function') {
                sehirleriGetirOrtak(ulkeKod, 'sehirSelect');
                const sehirBox = document.getElementById('sehirSelect');
                sehirBox.disabled = false;
                sehirBox.classList.remove('opacity-60', 'cursor-not-allowed');
            }
            if (ulkeKod && lokasyonVeritabani[ulkeKod]) {
                document.getElementById('telKod').value = lokasyonVeritabani[ulkeKod].tel;
            }
        }

        function durumSec(durum, btn) {
            document.querySelectorAll('.rol-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('urunDurumu').value = durum;
        }

        // --- YENİ RESİM SEÇME MANTIĞI ---
        function resimSecildi(input) {
            if (input.files) {
                const yeniDosyalar = Array.from(input.files);
                
                // Toplam sayı kontrolü (Mevcut + Yeni)
                if (secilenResimlerListesi.length + yeniDosyalar.length > 10) {
                    alert("En fazla 10 adet fotoğraf yükleyebilirsiniz!");
                    return;
                }

                document.getElementById('dosyaBilgisi').innerText = "Fotoğraflar İşleniyor...";
                
                let islenenSayi = 0;

                yeniDosyalar.forEach(dosya => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        // Listeye ekle
                        secilenResimlerListesi.push(e.target.result);
                        
                        // Önizlemeyi güncelle
                        galeriyiGuncelle();
                        
                        islenenSayi++;
                        if(islenenSayi === yeniDosyalar.length) {
                             document.getElementById('dosyaBilgisi').innerText = `✅ Toplam ${secilenResimlerListesi.length} Fotoğraf`;
                             document.getElementById('dosyaBilgisi').classList.add('text-green-600');
                        }
                    }
                    reader.readAsDataURL(dosya);
                });
            }
        }

        function galeriyiGuncelle() {
            const alan = document.getElementById('onizlemeAlani');
            alan.innerHTML = ""; // Temizle
            
            if (secilenResimlerListesi.length > 0) {
                alan.classList.remove('hidden');
                
                secilenResimlerListesi.forEach((resimBase64, index) => {
                    const div = document.createElement('div');
                    div.className = "relative h-20 w-full rounded-lg overflow-hidden border border-slate-200 shadow-sm";
                    
                    div.innerHTML = `
                        <img src="${resimBase64}" class="w-full h-full object-cover">
                        <div onclick="resimSil(${index})" class="foto-sil-btn"><i class="fa-solid fa-times"></i></div>
                    `;
                    alan.appendChild(div);
                });
            } else {
                alan.classList.add('hidden');
                document.getElementById('dosyaBilgisi').innerText = "Fotoğrafları Seç (Max 10)";
                document.getElementById('dosyaBilgisi').classList.remove('text-green-600');
            }
        }

        function resimSil(index) {
            secilenResimlerListesi.splice(index, 1); // Listeden çıkar
            galeriyiGuncelle(); // Görünümü yenile
            document.getElementById('dosyaBilgisi').innerText = secilenResimlerListesi.length > 0 ? 
                `✅ Toplam ${secilenResimlerListesi.length} Fotoğraf` : "Fotoğrafları Seç (Max 10)";
        }

        async function ilanGonder(e) {
            e.preventDefault();

            // ZORUNLU ALAN KONTROLÜ
            const gerekli = [
                {id: 'ulkeSelect', msg: 'Lütfen Ülke seçiniz.'},
                {id: 'sehirSelect', msg: 'Lütfen Şehir seçiniz.'},
                {id: 'telKod', msg: 'Lütfen Telefon Kodu seçiniz.'},
                {id: 'telNo', msg: 'Lütfen Telefon Numarası giriniz.'},
                {id: 'kategori', msg: 'Lütfen Kategori seçiniz.'},
                {id: 'fiyat', msg: 'Lütfen Fiyat giriniz.'},
                {id: 'baslik', msg: 'Lütfen Başlık giriniz.'},
                {id: 'aciklama', msg: 'Lütfen Açıklama giriniz.'}
            ];

            for (let item of gerekli) {
                const el = document.getElementById(item.id);
                if(!el || !el.value.trim()) {
                    alert(item.msg);
                    if(el) el.focus();
                    return;
                }
            }

            const btn = document.getElementById('gonderButton');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Kaydediliyor...';
            btn.disabled = true;

            const ulkeSelect = document.getElementById('ulkeSelect');
            const sehirAdi = document.getElementById('sehirSelect').value;
            const tamTelefon = document.getElementById('telKod').value + " " + document.getElementById('telNo').value;

            // Konum Bulma
            let lat = 48.8566, lon = 2.3522;
            try {
                const query = `${sehirAdi}, ${ulkeSelect.value}`;
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if(data && data.length > 0) {
                    lat = parseFloat(data[0].lat);
                    lon = parseFloat(data[0].lon);
                }
            } catch (err) {}

            const form = {
                durum: document.getElementById('urunDurumu').value,
                kategori: document.getElementById('kategori').value,
                ulkeKod: ulkeSelect.value,
                sehir: sehirAdi,
                fiyat: document.getElementById('fiyat').value,
                baslik: document.getElementById('baslik').value,
                aciklama: document.getElementById('aciklama').value
            };

            const yeniIlan = {
                id: Date.now(),
                baslik: form.baslik,
                kategori: 'esya', 
                altKategori: form.kategori,
                
                konum: form.sehir,
                sehir: form.sehir,
                ulke: form.ulkeKod,
                
                durum: form.durum,
                
                fiyat: form.fiyat + '€',
                fiyatSayi: parseInt(form.fiyat),
                
                aciklama: form.aciklama,
                telefon: tamTelefon,
                lat: lat, lon: lon,
                
                detaylar: { durum: form.durum, kategori: form.kategori },
                
                // --- ÇOKLU FOTO KAYDI ---
                // İlk fotoğraf kapak resmi olur, hepsi galeriye eklenir
                resim: secilenResimlerListesi.length > 0 ? secilenResimlerListesi[0] : null, 
                galeri: secilenResimlerListesi, 
                
                tarih: "Şimdi"
            };

            // Supabase & LocalStorage
            try {
                if (sb && typeof sb.from === 'function') await sb.from('ilanlar').insert([yeniIlan]);
            } catch (err) { console.error(err); }

            // ✅ BAŞARILI - Artık localStorage yok, sadece Supabase
            alert("✅ Eşya ilanınız başarıyla yayınlandı!");
            window.location.href = 'esya_vitrini.html';
        }
    </script>
</body>
</html>
